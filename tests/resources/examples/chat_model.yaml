name: chat-model
prompt: |
  You are a helpful assistant. Answer clearly and concisely.

executor:
  model: databricks-claude-sonnet-4-6

labels:
  integrity: "1"
  confidentiality: "0"

label_schema:
  integrity:
    values: ["0", "1"]
    monotonic: min
  confidentiality:
    values: ["0", "1"]
    monotonic: max

ask_timeout: 30
