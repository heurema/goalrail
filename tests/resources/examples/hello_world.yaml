# Hello World — the simplest possible Goalrail agent.
#
# Quick start:
#
#   1. Install the dependency:
#      pip install openai
#
#   2. Set your provider credentials:
#      export ANTHROPIC_API_KEY=<your-key>
#
#   3. Run it:
#      cd goalrail
#      python -m goalrail examples/hello_world.yaml --prompt "Hello!"
#
#   4. Or run interactively:
#      python -m goalrail examples/hello_world.yaml
#
# If you want to use a different model, override with --model:
#      python -m goalrail examples/hello_world.yaml --model openai/gpt-5-4-mini

name: hello_world
prompt: You are a friendly assistant. Say hello and answer questions.

executor:
  model: anthropic/claude-sonnet-4-6
