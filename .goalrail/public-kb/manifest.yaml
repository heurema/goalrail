schema_version: goalrail.public_kb_manifest.v1
project: goalrail
purpose: public_start_assistant
status: draft

rules:
  whitelist_only: true
  include_private_notes: false
  include_raw_transcripts: false
  include_client_data: false
  include_credentials: false
  include_unreviewed_chats: false

sources:
  - path: docs/product/GOALRAIL_GLOBAL_START_ASSISTANT.md
    title: Goalrail Global Start Assistant
    priority: canon
    public: true
    language: en
    notes: English-first global entry page and public assistant boundary.

  - path: docs/product/GOALRAIL_PROVIDER_BOUNDARIES.md
    title: Goalrail Provider Boundaries
    priority: canon
    public: true
    language: en
    notes: Public-safe boundary against AI IDE, tracker, and provider replacement claims.

  - path: docs/reference/start-assistant/static-answers.md
    title: Start Assistant Static Answers
    priority: reference
    public: true
    language: en
    notes: English public-safe answer seeds used by Stage 2 static page.

  - path: docs/reference/start-assistant/quick-questions.json
    title: Start Assistant Quick Questions
    priority: reference
    public: true
    language: en
    notes: English quick question labels and ordering.

exclude_patterns:
  - "**/*.local.*"
  - "**/.env*"
  - "**/*secret*"
  - "**/*credential*"
  - "**/node_modules/**"
  - "**/.git/**"
  - "**/dist/**"
  - "**/build/**"
