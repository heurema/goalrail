  web_surface:
    name: Web Surface
    status: prototype
    truth_owner: docs/product/GOALRAIL_MVP_BLUEPRINT.md
    implementation_paths:
      - apps/web/package.json
      - apps/web/package-lock.json
      - apps/web/README.md
      - apps/web/console
      - apps/web/demo-change-packet
      - apps/web/demo-change-packet-ru
      - apps/web/pilot-intake-ru
      - apps/web/pilot-intake-ru/server/go.mod
      - apps/web/pilot-intake-ru/server/cmd/goalrail-pilot-intake-ru
      - apps/web/pilot-intake-ru/server/internal/pilotlead
    public_claim_allowed: false
    notes: "Shared web rules live under apps/web. Current web surfaces remain prototype/public packaging surfaces only; no Goalrail goal-to-proof product loop is implemented yet. apps/web/pilot-intake-ru is the business-first RU pilot landing for pilot.goalrail.ru per D-0055 with ИИ-кодинг без хаоса, safe 2-week пилот ИИ-разработки, repository readiness, project context, controlled tasks, and verified result. The landing keeps D-0047 boundaries in force except for D-0056's narrow lead-capture endpoint, D-0058 daily digest, D-0059 Resend mail transport when configured, D-0061 notification-status retry semantics, and D-0065 retention/minimization guardrails. The repo source for that endpoint/digest is a landing-owned Go sidecar under apps/web/pilot-intake-ru/server per D-0062, not the core apps/server product API, and the prior PHP source is no longer an active repo runtime. Operator-managed deployment and public-live smoke status for the RU pilot landing is recorded in docs/ops/PILOT_INTAKE_RU_DEPLOYMENT_WIRING.md and docs/ops/STATUS.md. apps/web/console is now the single canonical multilingual EN/RU console source with static i18next resources, existing server login / optional first-login password change / `/v1/me` / logout flow, VITE_GOALRAIL_API_BASE_URL build-time API base URL support, in-memory access and refresh tokens only, no cookies, no token/profile/session browser-storage persistence, no locale browser-storage persistence, `goalrail.console.theme` as the only localStorage key, three structured empty product surfaces, bottom-left Settings utility, Appearance theme picker, and Users add/edit UI in component state only with no admin user API. The main console deployment is now live at `https://goalrail.dev` with API base URL `https://api.goalrail.dev` through the external `11me/infra` Flux GitOps path; live smoke and routing evidence are recorded in docs/ops/CONSOLE_MAIN_DEPLOYMENT_WIRING.md. The old apps/web/console-ru workspace source has been removed, and `https://console.goalrail.ru/` remains a separate legacy RU static deployment. The demo sandbox remains separate at `https://demo.goalrail.dev`. The live main API currently relies on nginx ingress CORS as a temporary bridge because the pinned goalrail-server image predates the app-level CORS implementation; later infra cleanup should pin a post-PR-#120 server image, enable app-level CORS, and remove ingress CORS annotations in one change. This component map keeps web_surface as prototype/public packaging only and does not use the component status to claim a mature Goalrail web product loop. No public registration, SSO, invite/reset email, password reset, SaaS onboarding, organization creation API, analytics, repo integration, runner, gate, proof, or backend beyond the pilot narrow endpoint/digest/mail-transport slice, existing core server auth endpoints, and current deployment routing exists."
