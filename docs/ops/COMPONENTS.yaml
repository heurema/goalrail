    name: Runtime Registry
    status: planned
    truth_owner: docs/product/GOALRAIL_MVP_BLUEPRINT.md
    implementation_paths: []
    public_claim_allowed: false
    notes: Planned integration surface only.
  primary_runtime_adapter:
    name: Primary Runtime Adapter
    status: planned
    truth_owner: docs/adr/ADR-0001-runtime-neutral-cli-first.md
    implementation_paths: []
    public_claim_allowed: false
