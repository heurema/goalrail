      - apps/cli/internal/proof
      - apps/cli/internal/proofcmd
      - apps/cli/testdata
    public_claim_allowed: false
    notes: First stdlib-only Go CLI bootstrap exists with canonical binary goalrail. It supports local/demo version, init repo binding draft, readiness scan, contract validate, and proof show commands. It has no server integration, hosted execution, real gate, runner integration, or proof generation.
  server_surface:
    name: Server Surface
    status: prototype
    truth_owner: docs/adr/ADR-0004-go-server-boundary-and-selected-stack.md
    implementation_paths:
      - apps/server/go.mod
      - apps/server/README.md
      - apps/server/cmd/goalrail-server
      - apps/server/internal/app
      - apps/server/internal/config
      - apps/server/internal/httpserver
      - apps/server/internal/spine
      - apps/server/internal/auth
      - apps/server/internal/intake
      - apps/server/internal/goal
      - apps/server/internal/clarification
      - apps/server/internal/contractseed
      - apps/server/internal/contract
      - apps/server/internal/contractdraft
      - apps/server/internal/approvedcontract
      - apps/server/internal/workitem
      - apps/server/internal/workitemplan
      - apps/server/internal/store
      - apps/server/internal/postgres
      - apps/server/internal/seed
      - apps/server/internal/eventlog
      - apps/server/internal/health
      - apps/server/internal/version
    public_claim_allowed: false
    notes: Go server skeleton exists with canonical binary goalrail-server. It exposes health/version plus Postgres-backed source-neutral intake with Project / RepoBinding validation, Goal promotion, deterministic Goal readiness state, public /v1/contracts lifecycle façade, public Contract aggregate persistence, internal ContractSeed creation, internal ContractDraft creation/update/ready_for_approval, internal ApprovedContract approval, EventLog persistence, transactional canonical write + event append hardening, explicit re-check-after-applied-answers, durable ClarificationRequest / ClarificationAnswer storage when DB is configured, WorkItem plan/proposal/acceptance planning/storage, and auth credential/session persistence plus password hashing primitives. A Postgres foundation exists for the Installation / Organization / Project / RepoBinding context and auth credentials/sessions, with migrations, dev seed, context lookup, and auth upsert/lookup primitives; Organizations are linked to an Installation and slugs are scoped to that Installation. Intake creates durable IntakeRecord only after repo binding context resolves and carries organization_id, project_id, and repo_binding_id; Goal promotion creates durable non-executable Goal only and preserves that context; Goal readiness updates persisted Goal state only with fixed reason codes and can be explicitly re-run after applied answers to mark ready_for_contract_seed. Durable events include intake.received, goal.created, intake.promoted_to_goal, goal.readiness_checked, readiness transition events, clarification.requested, clarification.answer_recorded, clarification.request_answered, clarification.answer_applied_to_goal, goal.hints_updated, contract_seed.created, contract_draft.created, contract_draft.updated, contract_draft.marked_ready_for_approval, contract.approved, and work_item.created; for Postgres-backed intake create, Goal promotion, Goal readiness, ClarificationRequest creation, ClarificationAnswer recording, answer application, ContractSeed creation plus Contract creation, ContractDraft creation plus Contract state update, ContractDraft update, ContractDraft ready_for_approval plus Contract state update, ApprovedContract approval plus Contract state update, and proposal acceptance WorkItem creation/event append, the canonical write and expected event appends share one transaction. ClarificationRequest creation persists an open request from stored readiness reason codes and appends `clarification.requested` transactionally when DB is configured; ClarificationAnswer recording stores answer evidence and transitions the request to answered; answer application marks the answer applied, updates Goal intent-plane hints only, rejects raw-text goal.intent_owner mapping, and does not call readiness automatically. POST /v1/contracts creates Contract(draft) from a ready Goal by creating internal ContractSeed(created) and ContractDraft(draft); GET /v1/contracts/{id} returns the public Contract view; PATCH /v1/contracts/{id}, POST /v1/contracts/{id}/submissions, and POST /v1/contracts/{id}/approvals resolve current internal lifecycle records through contract_id. Previous public contract-seeds, contract-drafts, and direct task creation routes are no longer registered. WorkItem planning uses `POST /v1/contracts/{id}/plans`, `GET /v1/plans/{id}`, `POST /v1/plans/{id}/proposals`, `GET /v1/proposals/{id}`, `POST /v1/proposals/{id}/acceptance`, and `GET /v1/tasks/{id}`; accepted proposals may create multiple planned tasks for one approved contract. There is no GET /v1/plans, GET /v1/proposals, or GET /v1/tasks list endpoint. ADR-0021 documents future planned lease paths `POST /v1/plans/leases`, `GET /v1/plans/leases/{id}`, and `PATCH /v1/plans/leases/{id}` as accepted design only; those paths are not registered today. Repo-aware planning computation, automatic readiness re-check, gate/proof, repo readiness, login endpoints, JWT, CLI login, SaaS onboarding, organization creation API, web UI, workers, leases, lease stores, generic queue implementation, assignment/claiming, and repository checkout remain unimplemented.
