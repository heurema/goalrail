      - apps/server/internal/bootstrapowner
      - apps/server/internal/store
      - apps/server/internal/postgres
      - apps/server/internal/seed
      - apps/server/internal/health
      - apps/server/internal/version
    public_claim_allowed: false
    notes: Go server skeleton exists with canonical binary goalrail-server. It exposes health/version plus the narrow auth API (`POST /v1/auth/login`, `POST /v1/auth/refresh`, `POST /v1/auth/change-password`, `POST /v1/auth/logout`, `GET /v1/me`) and CLI browser-loopback auth routes (`GET /cli/login`, `POST /cli/login`, `POST /v1/auth/cli/exchange`), authenticated composite repository-context init (`POST /v1/init/repository-context`), authenticated metadata-only repository context snapshot recording (`POST /v1/repo-bindings/{repo_binding_id}/context-snapshots`), authenticated metadata-only RepoBinding init (`POST /v1/projects/{project_id}/repo-bindings/init`), Postgres-backed source-neutral intake with Project / RepoBinding validation, Goal promotion, deterministic Goal readiness state, public /v1/contracts lifecycle facade, public Contract aggregate persistence, internal ContractSeed creation, internal ContractDraft creation/update/ready_for_approval, internal ApprovedContract approval, EventLog persistence, transactional canonical write + event append hardening, explicit re-check-after-applied-answers, durable ClarificationRequest / ClarificationAnswer storage when DB is configured, WorkItem plan/proposal/acceptance planning/storage, auth credential/session persistence plus password hashing primitives, and the local `goalrail-server bootstrap owner` command. A bounded source-level CORS middleware exists around the core server router and is controlled by `GOALRAIL_HTTP_CORS_ALLOWED_ORIGINS`, a comma-separated exact-origin allowlist for browser API calls from origins such as `https://goalrail.dev` or local `http://localhost:5173`; empty means disabled, wildcard origins are rejected, allowed origins are echoed exactly with `Vary: Origin`, preflight permits `GET`, `POST`, `PATCH`, `OPTIONS` plus `Authorization` and `Content-Type`, and credentials/cookies are not enabled. The live `https://api.goalrail.dev` deployment is routed through the external `11me/infra` Flux GitOps path and currently exposes health, readiness, version, and existing server routes from a pinned pre-PR-#120 goalrail-server image. Because that image predates app-level CORS, live browser CORS is temporarily provided by nginx ingress annotations allowing `https://goalrail.dev`; `GOALRAIL_HTTP_CORS_ALLOWED_ORIGINS` is not yet enabled in infra. The later cleanup is to pin a post-PR-#120 server image, enable app-level CORS, and remove nginx ingress CORS annotations in the same infra change. A bounded Docker image build/runtime surface exists for the core server binary only under `apps/server`; it does not add compose, deployment automation, registry publishing, Postgres containers, or product behavior. A Postgres foundation exists for the Installation / Organization / Project / RepoBinding / RepositoryContextSnapshot context and auth credentials/sessions, with migrations, dev seed, context lookup, Project create/lookup primitives, organization-wide RepoBinding lookup/uniqueness by active provider plus repository full name, snapshot idempotency by RepoBinding plus fingerprint, auth upsert/lookup primitives, CLI auth code primitives, and bootstrap owner store primitives; Organizations are linked to an Installation and slugs are scoped to that Installation. Structured DB config uses GOALRAIL_DATABASE_HOST / PORT / NAME / USER / PASSWORD / SSLMODE and production product/auth API routes require it; without DB config, health/version still work and product/auth routes return `503 database_not_configured` without opening Postgres or using in-memory product state. Map-backed product/auth store implementations were removed from `apps/server/internal/store`, and the old in-memory `apps/server/internal/eventlog` helper was removed; service and HTTP tests use package-local fakes where needed, while Postgres-backed stores are the only real server persistence implementation. The auth API verifies existing password credentials, rejects inactive users, requires active OrganizationMembership, creates server-owned refresh-token session state, signs short-lived JWT access tokens with `GOALRAIL_AUTH_JWT_SECRET`, refreshes access tokens from opaque DB-backed refresh-token state without refresh-token rotation, revokes the current session on bearer-token logout, clears `must_change_password` on authenticated password change, loads current User plus OrganizationMembership server-side for `/v1/me`, rejects `must_change_password` credentials before CLI code issuance, issues hashed one-time CLI auth codes with S256 code challenges after browser email/password login, validates localhost loopback redirects, redirects with only code and state, and exchanges valid unused CLI codes plus matching verifier for normal access/refresh tokens. The server-rendered `/cli/login` HTML page is a temporary CLI auth bridge only; `apps/web/console` now consumes the server auth API directly through the canonical multilingual console source, and the main deployment routes it through `https://api.goalrail.dev`. The server can start without `GOALRAIL_AUTH_JWT_SECRET`, but auth endpoints return a clear auth configuration error when token signing/validation is needed without it. Provider integration, repo-aware planning computation, automatic readiness re-check, audit scoring, gate/proof, repo readiness, refresh-token rotation, public registration, admin user creation endpoint, SaaS onboarding, organization creation API, workers, leases, lease stores, generic queue implementation, assignment/claiming, and repository checkout remain unimplemented.

