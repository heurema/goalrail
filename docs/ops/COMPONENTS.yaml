  server_surface:
    name: Server Surface
    status: prototype
    truth_owner: docs/adr/ADR-0004-go-server-boundary-and-selected-stack.md
    implementation_paths:
      - apps/server/go.mod
      - apps/server/README.md
      - apps/server/cmd/goalrail-server
      - apps/server/internal/app
      - apps/server/internal/config
      - apps/server/internal/httpserver
      - apps/server/internal/spine
      - apps/server/internal/intake
      - apps/server/internal/goal
      - apps/server/internal/clarification
      - apps/server/internal/store
      - apps/server/internal/postgres
      - apps/server/internal/seed
      - apps/server/internal/eventlog
      - apps/server/internal/health
      - apps/server/internal/version
    public_claim_allowed: false
    notes: Go server skeleton exists with canonical binary goalrail-server. It exposes health/version plus Postgres-backed source-neutral intake with Project / RepoBinding validation, Goal promotion, deterministic Goal readiness state, and intake/goal EventLog persistence when DB is configured. A Postgres foundation exists for the Organization / Project / RepoBinding context, with migrations, dev seed, and context lookup. Intake creates durable IntakeRecord only after repo binding context resolves and carries organization_id, project_id, and repo_binding_id; Goal promotion creates durable non-executable Goal only and preserves that context; Goal readiness updates persisted Goal state only with fixed reason codes. Durable events include intake.received, goal.created, intake.promoted_to_goal, goal.readiness_checked, and readiness transition events. ClarificationRequest creation creates an open request only from stored readiness reason codes; ClarificationAnswer recording stores answer evidence only and transitions the request to answered; answer application updates Goal intent-plane hints only and rejects raw-text goal.intent_owner mapping. Clarification request/answer state remains in-memory. There is no durable clarification storage, no automatic readiness re-check, no contract/work item creation, no gate/proof, no repo readiness, no auth, no workers, and no repository checkout.
