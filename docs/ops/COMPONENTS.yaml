      - NOTICE
      - TRADEMARKS.md
      - DCO.md
      - CONTRIBUTING.md
      - CODE_OF_CONDUCT.md
      - SECURITY.md
      - SUPPORT.md
      - .github/PULL_REQUEST_TEMPLATE.md
      - .github/pr-intake-gate.yml
      - .github/workflows/pr-intake-gate.yml
      - .github/workflows/repo-checks.yml
      - docs/ops/BRANCH_PROTECTION.md
      - .github/CODEOWNERS
      - .github/ISSUE_TEMPLATE
    public_claim_allowed: true
    notes: Open-source and contributor-experience baseline is real; this governs licensing, DCO signoff, community docs, issue/PR intake, the deterministic PR Intake Gate workflow/policy, D-0063 repo checks CI for current Go + web surfaces only, and D-0064 external GitHub branch protection for `main`. The repo checks workflow runs Go test/vet/build for apps/server, apps/cli, and apps/web/pilot-intake-ru/server plus apps/web npm ci and workspace typecheck/test/build. Verified branch protection for `main` requires docs-check, pr-intake-gate, go (apps/cli), go (apps/server), go (apps/web/pilot-intake-ru/server), and web workspaces with strict up-to-date checks, admin enforcement, force pushes disabled, and branch deletion disabled. It intentionally does not add PHP CI, deployment automation, server config, secrets, analytics, CRM, database, queue, LLM/API, repo integration, runtime execution, gate, proof, broad backend platform, required human review, signed-commit requirement, or merge queue. The reusable PR intake gate engine lives in `heurema/repo-governance`, not in Goalrail runtime code.
