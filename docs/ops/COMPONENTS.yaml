  server_surface:
    name: Server Surface
    status: prototype
    truth_owner: docs/adr/ADR-0004-go-server-boundary-and-selected-stack.md
    implementation_paths:
      - apps/server/go.mod
      - apps/server/cmd/goalrail-server
      - apps/server/internal/app
      - apps/server/internal/config
      - apps/server/internal/httpserver
      - apps/server/internal/spine
      - apps/server/internal/intake
      - apps/server/internal/goal
      - apps/server/internal/clarification
      - apps/server/internal/store
      - apps/server/internal/eventlog
      - apps/server/internal/health
      - apps/server/internal/version
    public_claim_allowed: false
    notes: Go server skeleton exists with canonical binary goalrail-server. It exposes health/version plus in-memory source-neutral intake, Goal promotion, deterministic Goal readiness, ClarificationRequest creation, and ClarificationAnswer recording prototypes. Intake creates IntakeRecord only; Goal promotion creates non-executable Goal only; Goal readiness updates Goal state only with fixed reason codes; ClarificationRequest creation creates an open request only from stored readiness reason codes; ClarificationAnswer recording stores answer evidence only and transitions the request to answered. Events remain in-memory, including intake.received, goal.created, intake.promoted_to_goal, goal.readiness_checked, readiness transition events, clarification.requested, clarification.answer_recorded, and clarification.request_answered. There is no durable storage, no answer application, no Goal hint update flow, no automatic readiness re-check, no contract/work item creation, no gate/proof, no repo readiness, no auth, no workers, and no repository checkout.
