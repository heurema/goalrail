    status: docs_only
    truth_owner: docs/adr/ADR-0024-provider-neutral-vcs-connection-boundary.md
    implementation_paths: []
    public_claim_allowed: false
    notes: ADR-0024 defines VcsConnection as a future provider-neutral VCS connection / account authorization / metadata-discovery boundary before any GitLab/provider implementation. docs/ops/VCS_BACKEND_IMPLEMENTATION_SEQUENCING.md now records the docs-only backend implementation order and recommends a provider credential/token storage boundary before schema, API, OAuth, provider clients, or live repository metadata APIs. RepoBinding remains the current metadata-only Project-to-repository reference, RepositoryRecord remains deferred until catalog/sync/reuse/policy pressure exists, checkout eligibility stays separate from provider connection and repository metadata, and provider-specific concepts stay in adapters or adapter-owned metadata. No backend schema/API, provider client, OAuth, provider token storage, checkout credential, repository clone, runner, gate, proof, provider sync job, repository catalog, or generic queue behavior exists for this boundary.
