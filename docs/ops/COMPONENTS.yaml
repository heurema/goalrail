  server_surface:
    name: Server Surface
    status: prototype
    truth_owner: docs/adr/ADR-0004-go-server-boundary-and-selected-stack.md
    implementation_paths:
      - apps/server/go.mod
      - apps/server/README.md
      - apps/server/cmd/goalrail-server
      - apps/server/internal/app
      - apps/server/internal/config
      - apps/server/internal/httpserver
      - apps/server/internal/spine
      - apps/server/internal/intake
      - apps/server/internal/goal
      - apps/server/internal/clarification
      - apps/server/internal/contractseed
      - apps/server/internal/store
      - apps/server/internal/postgres
      - apps/server/internal/seed
      - apps/server/internal/eventlog
      - apps/server/internal/health
      - apps/server/internal/version
    public_claim_allowed: false
    notes: Go server skeleton exists with canonical binary goalrail-server. It exposes health/version plus in-memory source-neutral intake with Project / RepoBinding validation, Goal promotion, deterministic Goal readiness, ClarificationRequest creation, ClarificationAnswer recording, answer application, explicit re-check-after-applied-answers, and ContractSeed creation prototypes. A first Postgres foundation exists for the Organization / Project / RepoBinding context, with migrations, dev seed, and context lookup. Intake creates IntakeRecord only after repo binding context resolves and carries organization_id, project_id, and repo_binding_id; Goal promotion creates non-executable Goal only and preserves that context; Goal readiness updates Goal state only with fixed reason codes and can be explicitly re-run after applied answers to mark ready_for_contract_seed. ClarificationRequest creation creates an open request only from stored readiness reason codes; ClarificationAnswer recording stores answer evidence only and transitions the request to answered; answer application updates Goal intent-plane hints only, rejects raw-text goal.intent_owner mapping, and does not call readiness automatically. ContractSeed creation stores ContractSeed(created) snapshot only as an in-memory prototype from Goal(ready_for_contract_seed), does not mutate Goal state, and guards repeated creation with 409 already_seeded. Intake, Goal, clarification, answer application, ContractSeed, and events remain in-memory. In-memory events include intake.received, goal.created, intake.promoted_to_goal, goal.readiness_checked, readiness transition events, clarification.requested, clarification.answer_recorded, clarification.request_answered, clarification.answer_applied_to_goal, goal.hints_updated, and contract_seed.created. There is no durable storage for intake/Goal/clarification/answer application/ContractSeed/event log flows, no automatic readiness re-check, no ContractDraft, no contract approval, no contract/work item creation, no gate/proof, no repo readiness, no auth, no workers, and no repository checkout.
