  proof_artifact:
    name: Proof Artifact
    status: planned
    truth_owner: docs/product/GOALRAIL_MVP_BLUEPRINT.md
    implementation_paths: []
    public_claim_allowed: false
    notes: Proof artifact is defined in docs only.
  web_surface:
    name: Web Surface
    status: prototype
    truth_owner: docs/product/GOALRAIL_MVP_BLUEPRINT.md
    implementation_paths:
      - apps/web/package.json
      - apps/web/package-lock.json
      - apps/web/README.md
      - apps/web/console
      - apps/web/console-ru
      - apps/web/demo-change-packet
      - apps/web/demo-change-packet-ru
      - apps/web/pilot-intake-ru
      - apps/web/pilot-intake-ru/server/go.mod
      - apps/web/pilot-intake-ru/server/cmd/goalrail-pilot-intake-ru
      - apps/web/pilot-intake-ru/server/internal/pilotlead
    public_claim_allowed: false
    notes: Shared web rules live under apps/web. Current web surfaces remain prototype/public packaging surfaces only; no Goalrail web product loop is implemented yet. apps/web/pilot-intake-ru is now the business-first RU pilot landing for pilot.goalrail.ru per D-0055 with ИИ-кодинг без хаоса, safe 2-week пилот ИИ-разработки, repository readiness, project context, controlled tasks, and verified result. The previous 5-step technical interactive walkthrough is demoted to internal / technical demo or checkpoint status in git history. The landing keeps D-0047 boundaries in force except for D-0056's narrow lead-capture endpoint: same-origin POST /api/pilot-lead may validate email, write/update a local JSONL lead record with notification_status, suppress duplicates for successfully notified, legacy processed, and in-flight rows, retry after notification_failed, notify a server-local direct recipient configured outside the repo with fallback to hello@goalrail.dev, send a server-installed daily previous-day digest when leads exist, use D-0059 Resend HTTPS mail transport with `skill7.dev` sender when the server-local API key is configured, omit user-agent from new lead rows, and provide a local dry-run-first JSONL purge command with 90-day default retention and bounded override. The repo source for this endpoint/digest is now a landing-owned Go sidecar under apps/web/pilot-intake-ru/server per D-0062, not the core apps/server product API, and the prior PHP source is no longer an active repo runtime. There is still no analytics, tracking, IP logging, fingerprinting, CRM, Google Sheets, cookies, sessions, LLM/API, repo provider integration, code execution, broad backend platform, chat UI, file upload, model selector, or real repository scan claim; reverse-proxy rate limiting remains operator-managed deployment posture, not committed repo-side server config. Direct mailto fallback remains. The active target domain remains pilot.goalrail.ru per D-0053, canonical metadata remains https://pilot.goalrail.ru/, and SSH static deployment remains the hosting path per D-0051. Operator-managed deployment and public-live smoke status for the RU pilot landing is recorded in docs/ops/PILOT_INTAKE_RU_DEPLOYMENT_WIRING.md and docs/ops/STATUS.md. This component map keeps web_surface as prototype/public packaging only and does not use the component status to claim a mature Goalrail web product loop. No backend beyond the narrow endpoint/digest/mail-transport slice exists.
  cli_surface:
    name: CLI Surface
    status: prototype
    truth_owner: docs/product/GOALRAIL_MVP_BLUEPRINT.md
    implementation_paths:
      - apps/cli/go.mod
      - apps/cli/cmd/goalrail
      - apps/cli/internal/app
      - apps/cli/internal/clienv
      - apps/cli/internal/cli
      - apps/cli/internal/exitcode
      - apps/cli/internal/spine
      - apps/cli/internal/term
      - apps/cli/internal/initcmd
      - apps/cli/internal/readiness
      - apps/cli/internal/readinesscmd
      - apps/cli/internal/contract
      - apps/cli/internal/contractcmd
      - apps/cli/internal/proof
      - apps/cli/internal/proofcmd
      - apps/cli/testdata
    public_claim_allowed: false
    notes: First stdlib-only Go CLI bootstrap exists with canonical binary goalrail. It supports local/demo version, init repo binding draft, readiness scan, contract validate, and proof show commands. It has no server integration, hosted execution, real gate, runner integration, or proof generation.
  server_surface:
    name: Server Surface
    status: prototype
    truth_owner: docs/adr/ADR-0004-go-server-boundary-and-selected-stack.md
    implementation_paths:
      - apps/server/go.mod
      - apps/server/README.md
      - apps/server/cmd/goalrail-server
      - apps/server/internal/app
      - apps/server/internal/config
      - apps/server/internal/httpserver
      - apps/server/internal/spine
      - apps/server/internal/intake
      - apps/server/internal/goal
      - apps/server/internal/clarification
      - apps/server/internal/contractseed
      - apps/server/internal/contract
      - apps/server/internal/contractdraft
      - apps/server/internal/approvedcontract
      - apps/server/internal/workitem
      - apps/server/internal/store
      - apps/server/internal/postgres
      - apps/server/internal/seed
      - apps/server/internal/eventlog
      - apps/server/internal/health
      - apps/server/internal/version
    public_claim_allowed: false
    notes: Go server skeleton exists with canonical binary goalrail-server. It exposes health/version plus Postgres-backed source-neutral intake with Project / RepoBinding validation, Goal promotion, deterministic Goal readiness state, public /v1/contracts lifecycle façade, public Contract aggregate persistence, internal ContractSeed creation, internal ContractDraft creation/update/ready_for_approval, internal ApprovedContract approval, EventLog persistence, transactional canonical write + event append hardening, explicit re-check-after-applied-answers, in-memory ClarificationRequest / ClarificationAnswer / answer application prototypes, and simple v0 in-memory WorkItem planning. A Postgres foundation exists for the Organization / Project / RepoBinding context, with migrations, dev seed, and context lookup. Intake creates durable IntakeRecord only after repo binding context resolves and carries organization_id, project_id, and repo_binding_id; Goal promotion creates durable non-executable Goal only and preserves that context; Goal readiness updates persisted Goal state only with fixed reason codes and can be explicitly re-run after applied answers to mark ready_for_contract_seed. Durable events include intake.received, goal.created, intake.promoted_to_goal, goal.readiness_checked, readiness transition events, contract_seed.created, contract_draft.created, contract_draft.updated, contract_draft.marked_ready_for_approval, contract.approved, and work_item.created; for Postgres-backed intake create, Goal promotion, Goal readiness, ContractSeed creation plus Contract creation, ContractDraft creation plus Contract state update, ContractDraft update, ContractDraft ready_for_approval plus Contract state update, and ApprovedContract approval plus Contract state update, the canonical write and expected event appends share one transaction. ClarificationRequest creation creates an open request only from stored readiness reason codes; ClarificationAnswer recording stores answer evidence only and transitions the request to answered; answer application updates Goal intent-plane hints only, rejects raw-text goal.intent_owner mapping, and does not call readiness automatically. POST /v1/contracts creates Contract(draft) from a ready Goal by creating internal ContractSeed(created) and ContractDraft(draft); GET /v1/contracts/{id} returns the public Contract view; PATCH /v1/contracts/{id}, POST /v1/contracts/{id}/submissions, and POST /v1/contracts/{id}/approvals resolve current internal lifecycle records through contract_id. Previous public contract-seeds and contract-drafts lifecycle routes are no longer registered. WorkItem planning creates exactly one WorkItem(planned) per approved Contract in simple v0 through an in-memory store only, resolves public contract_id to the internal approved snapshot, guards repeated planning with 409 already_planned, appends work_item.created through the configured EventLog path, and does not assign, claim, create Run, start execution, checkout a repository, submit a receipt, write GateDecision, or create Proof. Planning request/proposal/acceptance implementation, repo-aware planning computation, durable clarification storage, durable WorkItem storage, automatic readiness re-check, gate/proof, repo readiness, auth, workers, and repository checkout remain unimplemented.
