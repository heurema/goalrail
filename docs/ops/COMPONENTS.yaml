  web_surface:
    name: Web Surface
    status: prototype
    truth_owner: docs/product/GOALRAIL_MVP_BLUEPRINT.md
    implementation_paths:
      - apps/web/package.json
      - apps/web/package-lock.json
      - apps/web/README.md
      - apps/web/console
      - apps/web/console-ru
      - apps/web/demo-change-packet
      - apps/web/demo-change-packet-ru
      - apps/web/pilot-intake-ru
    public_claim_allowed: false
    notes: Shared web rules live under apps/web. Current web surfaces remain prototype/public packaging surfaces only; no Goalrail web product loop is implemented yet. apps/web/pilot-intake-ru now ships a complete RU pilot-first interactive landing demo as a deterministic local 5-step walkthrough (Goal Intake → Clarification → Contract Draft → Review → Honest Outcome) on pure helpers (detectScenario, buildContractDraft, buildReviewReport, deriveOutcomeTone, buildOutcomeReport); it does not call backends, LLMs, or repo providers, does not persist user input, does not execute code, and does not send analytics; the outcome CTA only focuses the existing mailto: email input. Canonical copy and governance live in docs/product/GOALRAIL_LANDING_COPY_PILOT_FIRST.md and docs/ops/DECISIONS.md D-0047. The surface is approved as the candidate public RU landing demo per docs/ops/DECISIONS.md D-0048, deployment-prep readiness is captured in docs/ops/PILOT_INTAKE_RU_DEPLOYMENT_PREP.md (recommendation: READY WITH WARNINGS — build/test/typecheck/boundary/copy-parity all pass; very-narrow hero-title warning resolved by a CSS-only <420px polish), the active target domain is pilot.goalrail.ru per docs/ops/DECISIONS.md D-0053 (which supersedes D-0049 for target domain and canonical public URL; D-0049's pilot.goalrail.dev body is preserved as historical record and the .dev domain is reserved for a later global-market rollout) with public path / and public status candidate-public, the pre-publish canonical metadata in apps/web/pilot-intake-ru/index.html matches D-0053 (https://pilot.goalrail.ru/, also present in built dist/index.html after the Phase 8K rebuild), the static hosting path has been changed from Cloudflare Pages Direct Upload (D-0050, now superseded by D-0051 for hosting provider and deployment mode; Cloudflare Pages, Workers, Functions, KV / R2 / D1 / Durable Objects / Queues, proxy / CDN, and Web Analytics remain disallowed for this surface) to an operator-managed SSH static server per docs/ops/DECISIONS.md D-0051 (manual rsync/scp upload of apps/web/pilot-intake-ru/dist to a timestamped release directory with atomic current symlink, no automatic redeploys, no CI deploy workflow, no SSH credentials/hostnames/IPs/keys/tokens committed to the repository, server-managed HTTPS via existing reverse proxy or Let's Encrypt, DNS handled externally by the operator with the record kept DNS-only / non-proxied if the zone is in Cloudflare), and SSH static deployment wiring is captured in docs/ops/PILOT_INTAKE_RU_DEPLOYMENT_WIRING.md with status READY FOR SSH DEPLOY — RUNTIME VALUES REQUIRED after Phase 8H and a same-day Phase 8I re-attempt (Phase 8H ran local preflight, source boundary scan, and local preview smoke — all PASS; Phase 8I re-ran the same local half end-to-end with identical PASS outcomes; in both phases no remote SSH/rsync/scp was performed because the operator did not provide the required runtime env vars; no server identifiers were committed). It is not deployed, no backend exists, and email capture remains mailto/focus/manual handoff.
