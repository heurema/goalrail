      - apps/web/console-ru
      - apps/web/demo-change-packet
      - apps/web/demo-change-packet-ru
      - apps/web/pilot-intake-ru
    public_claim_allowed: false
    notes: Shared web rules live under apps/web. The empty real console shells live under apps/web/console for console.goalrail.dev and apps/web/console-ru for console.goalrail.ru with three navigation-only surfaces and no data-backed product functionality. Current React + Vite + Mantine prototypes are the EN change-packet walkthrough under apps/web/demo-change-packet deployed at demo.goalrail.dev, the separate RU change-packet copy under apps/web/demo-change-packet-ru deployed at demo.goalrail.ru, and the RU pilot-intake landing under apps/web/pilot-intake-ru. These are prototype/public packaging surfaces only; no Goalrail web product loop is implemented yet.
  cli_surface:
    name: CLI Surface
    status: prototype
    truth_owner: docs/product/GOALRAIL_MVP_BLUEPRINT.md
    implementation_paths:
      - apps/cli/go.mod
      - apps/cli/cmd/goalrail
      - apps/cli/internal/app
      - apps/cli/internal/clienv
      - apps/cli/internal/cli
      - apps/cli/internal/exitcode
      - apps/cli/internal/spine
      - apps/cli/internal/term
      - apps/cli/internal/initcmd
      - apps/cli/internal/readiness
      - apps/cli/internal/readinesscmd
      - apps/cli/internal/contract
      - apps/cli/internal/contractcmd
      - apps/cli/internal/proof
      - apps/cli/internal/proofcmd
      - apps/cli/testdata
    public_claim_allowed: false
    notes: First stdlib-only Go CLI bootstrap exists with canonical binary goalrail. It supports local/demo version, init repo binding draft, readiness scan, contract validate, and proof show commands. It has no server integration, no production repo auth or deploy-key provisioning, no hosted execution, no real gate, and no proof generation.
  server_surface:
    name: Server Surface
    status: prototype
    truth_owner: docs/adr/ADR-0004-go-server-boundary-and-selected-stack.md
    implementation_paths:
      - apps/server/go.mod
      - apps/server/cmd/goalrail-server
      - apps/server/internal/app
      - apps/server/internal/config
      - apps/server/internal/httpserver
      - apps/server/internal/spine
      - apps/server/internal/intake
      - apps/server/internal/goal
      - apps/server/internal/store
      - apps/server/internal/eventlog
      - apps/server/internal/health
      - apps/server/internal/version
    public_claim_allowed: false
    notes: Go server skeleton exists with canonical binary goalrail-server. It exposes health/version plus in-memory source-neutral intake, Goal promotion, and deterministic Goal readiness prototypes. Intake creates IntakeRecord only; Goal promotion creates non-executable Goal only; Goal readiness updates Goal state only with fixed reason codes. Events remain in-memory, including intake.received, goal.created, intake.promoted_to_goal, goal.readiness_checked, and readiness transition events. There is no durable storage, no clarification object model, no contract/work item creation, no gate/proof, no repo readiness, no auth, and no workers.
  tracker_sync:
