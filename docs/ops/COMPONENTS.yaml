components:
  project_spine:
    name: Project Spine
    status: docs_only
    truth_owner: docs/PROJECT_SPINE_SCHEMA.md
    implementation_paths: []
    public_claim_allowed: false
    notes: Canonical schema note exists. The MVP uses direct RepoBinding before RepositoryRecord, and RepoBinding stores the repo reference directly. The CLI has a local internal DTO subset under apps/cli/internal/spine, and the server now has local intake, Goal, ClarificationRequest, ClarificationAnswer, ContractSeed, ContractDraft, and ApprovedContract DTO/value types plus the ContractDraft update, ready_for_approval, and approval request DTOs under apps/server/internal/spine. The server has a bounded durable IntakeRecord / Goal / ContractSeed / ContractDraft / ApprovedContract / EventLog slice, but there is still no standalone Project Spine package or complete production state store.
  organization_context:
    name: Organization Context
    status: prototype
    truth_owner: docs/adr/ADR-0010-organization-project-repo-binding-persistence-boundary.md
    implementation_paths:
      - apps/server/internal/spine/project_context.go
      - apps/server/internal/store/project_context_store.go
      - apps/server/internal/seed
      - apps/server/internal/postgres/migrations/00001_init.sql
    public_claim_allowed: false
    notes: User/Organization/Membership/Project/RepoBinding MVP boundary now has server-local types, a UUID-backed init migration, a Squirrel-backed upsert store, a Squirrel-backed RepoBinding context lookup, deterministic UUIDv7 dev seed, and intake validation wiring that derives organization context for IntakeRecord and Goal. It does not implement auth, onboarding, CRUD endpoints, VcsConnection, RepositoryRecord, or provider integration.
  server_persistence:
    name: Server Persistence
    status: prototype
    truth_owner: docs/adr/ADR-0010-organization-project-repo-binding-persistence-boundary.md
    implementation_paths:
      - apps/server/go.mod
      - apps/server/go.sum
      - apps/server/README.md
      - apps/server/cmd/goalrail-server
      - apps/server/internal/config
      - apps/server/internal/postgres
      - apps/server/internal/store/project_context_store.go
      - apps/server/internal/store/postgres_intake_store.go
      - apps/server/internal/store/postgres_goal_store.go
      - apps/server/internal/store/postgres_contract_seed_store.go
      - apps/server/internal/store/postgres_contract_draft_store.go
      - apps/server/internal/store/postgres_approved_contract_store.go
      - apps/server/internal/store/postgres_event_log.go
      - apps/server/internal/seed
    public_claim_allowed: false
    notes: pgx + Squirrel + goose foundation exists for the project-context tables, IntakeRecord, Goal, ContractSeed, ContractDraft creation/update/ready_for_approval, ApprovedContract approval, and EventLog persistence, plus deterministic UUIDv7 dev seed. Runtime SQL in the stores is built through Squirrel and executed through pgx/pgxpool. Goose migrations are raw SQL. Intake uses Postgres to validate Project / RepoBinding context, derive organization_id, persist IntakeRecord, persist promoted Goal state, persist ContractSeed, ContractDraft creation/update/ready_for_approval state, ApprovedContract approval snapshots, and append durable audit events. Postgres-backed intake create, Goal promotion, Goal readiness, ContractSeed creation, ContractDraft creation/update, ContractDraft ready_for_approval, and ApprovedContract approval writes share transactions with their expected event appends. Clarification request/answer storage remains in-memory.
  product_concept:
    name: Product Concept
    status: docs_only
    truth_owner: docs/product/GOALRAIL_PRODUCT_CONCEPT.md
    implementation_paths: []
    public_claim_allowed: false
    notes: Canonical product thesis exists in docs only.
  contract_lifecycle:
    name: Contract Lifecycle
    status: prototype
    truth_owner: docs/product/GOALRAIL_OPERATING_MODEL.md
    implementation_paths:
      - apps/server/internal/contractseed
      - apps/server/internal/contractdraft
      - apps/server/internal/approvedcontract
      - apps/server/internal/store/contract_seed_store.go
      - apps/server/internal/store/contract_draft_store.go
      - apps/server/internal/store/approved_contract_store.go
      - apps/server/internal/store/postgres_contract_seed_store.go
      - apps/server/internal/store/postgres_contract_draft_store.go
      - apps/server/internal/store/postgres_approved_contract_store.go
      - apps/server/internal/postgres/migrations/00001_init.sql
    public_claim_allowed: false
    notes: ContractSeed creation plus ContractDraft creation, review/update, ready_for_approval, and ApprovedContract approval are implemented as bounded server prototypes, backed by Postgres when DB is configured and in-memory otherwise. The editable init migration allows ContractDraft states draft and ready_for_approval and adds approved_contracts for ApprovedContract snapshots. They append contract_seed.created, contract_draft.created, contract_draft.updated, contract_draft.marked_ready_for_approval, and contract.approved events; in the Postgres path, the canonical write plus event append share one transaction. ready_for_approval is not approval, and ApprovedContract is not executable work. WorkItem, runner, gate, and proof remain unimplemented.
