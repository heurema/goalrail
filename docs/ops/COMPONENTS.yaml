      - apps/server/internal/store/postgres_contract_store.go
      - apps/server/internal/store/postgres_contract_seed_store.go
      - apps/server/internal/store/postgres_contract_draft_store.go
      - apps/server/internal/store/postgres_approved_contract_store.go
      - apps/server/internal/postgres/migrations/00001_init.sql
    public_claim_allowed: false
    notes: The smallest public Contract aggregate boundary is implemented as server-local spine type plus Postgres stores, and the public /v1/contracts lifecycle façade now exists. POST /v1/contracts creates Contract(draft) from a ready Goal by composing internal ContractSeed(created) and ContractDraft(draft) creation; GET/PATCH/submissions/approvals operate by stable public contract_id and resolve current internal lifecycle records. ContractSeed, ContractDraft, and ApprovedContract remain internal lifecycle records; the previous public contract-seeds / contract-drafts lifecycle routes and direct public task creation route are no longer registered. The old map-backed contract lifecycle stores were removed from `apps/server/internal/store`; tests use package-local fakes where needed. The editable init migration includes contracts plus contract_id links on lifecycle tables. WorkItem planning remains under task_shaping as a non-executable plan/proposal/acceptance boundary; runner, gate, and proof remain unimplemented.
  task_shaping:
    name: Task Shaping
    status: prototype
    truth_owner: docs/product/GOALRAIL_MVP_BLUEPRINT.md
    implementation_paths:
      - apps/server/internal/spine/work_item.go
      - apps/server/internal/spine/work_item_plan.go
      - apps/server/internal/workitem
      - apps/server/internal/workitemplan
      - apps/server/internal/store/postgres_work_item_store.go
      - apps/server/internal/store/postgres_work_item_plan_store.go
      - apps/server/internal/httpserver/work_item.go
      - apps/server/internal/httpserver/work_item_plan.go
      - apps/server/internal/postgres/migrations/00001_init.sql
    public_claim_allowed: false
    notes: "WorkItem planning exists as a server-owned non-executable control-plane boundary from approved public Contract to WorkItemPlan(queued), WorkItemPlanProposal(submitted), explicit acceptance, and one or more canonical WorkItem(planned) records. Public routes are `POST /v1/contracts/{id}/plans`, `GET /v1/plans/{id}`, `POST /v1/plans/{id}/proposals`, `GET /v1/proposals/{id}`, `POST /v1/proposals/{id}/acceptance`, and `GET /v1/tasks/{id}`. Direct public `POST /v1/contracts/{id}/tasks` is removed. WorkItem plans, proposals, and accepted WorkItems are durable in Postgres when structured database config is present; production server wiring returns `503 database_not_configured` without DB config instead of using in-memory product state. The old map-backed WorkItem/WorkItemPlan stores were removed from `apps/server/internal/store`; tests use package-local fakes where needed. Accepted WorkItems carry plan_id and proposal_id. There is no plan/proposal/task list/search endpoint. Proposal acceptance appends work_item.created transactionally with WorkItem writes when Postgres is configured. Canonical WorkItem writes remain API-server-owned; workers/planners submit proposals through the API and do not write WorkItems directly to the DB. ADR-0021 accepts the future typed WorkItemPlan pull lease boundary as design only: `WorkItemPlan(state=queued)` is the typed planning queue item, future `WorkItemPlanLease` records reserve plans through API-server-owned pull leasing, and future planned routes are `POST /v1/plans/leases`, `GET /v1/plans/leases/{id}`, and `PATCH /v1/plans/leases/{id}`. No worker/controller, runner-backed planner, lease protocol, plan `leased` state, lease token handling, proposal lease-proof enforcement, assignment, claiming, execution, Run, receipt, GateDecision, Proof, checkout, generic queue, outbox, broker, or runtime registry implementation exists yet."
