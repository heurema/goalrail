      - apps/cli/internal/contract
      - apps/cli/internal/contractcmd
      - apps/cli/internal/proof
      - apps/cli/internal/proofcmd
      - apps/cli/testdata
    public_claim_allowed: false
    notes: First Go CLI bootstrap exists with canonical binary goalrail and Cobra-backed command parsing. It supports local/demo version, Git-aware init, normal server-backed `goalrail init` repository-context bootstrap through the stored login profile, optional `goalrail init --base <branch>` workflow base override without Git mutation, low-level explicit `goalrail init --project <project_id>` RepoBinding metadata initialization, explicit auth-free `goalrail init --local-demo`, server-backed `goalrail work start`, readiness scan, contract validate, proof show, and the first `goalrail login <server_url>` browser localhost-loopback auth path. Login requires an explicit http(s) server URL, opens or prints the server `/cli/login` URL with random state plus S256 code challenge, validates callback `state`, exchanges a one-time code plus verifier through `POST /v1/auth/cli/exchange`, and stores server_url plus access/refresh token metadata in a local auth JSON file with 0600 permissions. Server-backed init uses local Git metadata, requires `workflow_base_branch` unless `--base` is provided, sends bearer auth, fails expired access tokens locally before HTTP, preflights an existing Git-root `.goalrail/project.yml` marker for known server/repo/base conflicts before the server call, writes a non-secret marker/cache after successful server init, and refuses to overwrite different existing content. Plain `goalrail init` calls `POST /v1/init/repository-context`, which creates or reuses a repo-backed Project and RepoBinding inside the existing authenticated Organization, then records a bounded metadata-only repository context snapshot through `POST /v1/repo-bindings/{repo_binding_id}/context-snapshots`. `goalrail init --project` keeps the low-level `POST /v1/projects/{project_id}/repo-bindings/init` path. `goalrail init --local-demo` writes no files and performs no auth or server call. `goalrail work start` reads the existing Git-root marker plus the stored login profile, calls `/v1/me`, submits `/v1/intakes`, and promotes through `/v1/intakes/{id}/goals`; it does not create WorkItems, contracts, audit requests, runs, gates, or proof. The marker stores server/project/repo identity only, never access or refresh tokens, and the snapshot stays server-side. There is no hosted execution, real gate, runner integration, keychain integration, token refresh framework, Organization selection UX, public Organization creation, audit queue, hooks, branch creation, provider integration, proof retrieval, or proof generation.
  server_surface:
    name: Server Surface
    status: prototype
    truth_owner: docs/adr/ADR-0004-go-server-boundary-and-selected-stack.md
