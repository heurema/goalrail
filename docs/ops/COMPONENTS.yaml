schema_version: goalrail.components.v0
updated_at: 2026-05-02
authority: operational
status_anchor: true
components:
  project_spine:
    name: Project Spine
    status: docs_only
    truth_owner: docs/PROJECT_SPINE_SCHEMA.md
    implementation_paths: []
    public_claim_allowed: false
    notes: Canonical schema note exists. The MVP uses direct RepoBinding before RepositoryRecord, and RepoBinding stores the repo reference directly. The CLI has a local internal DTO subset under apps/cli/internal/spine, and the server now has local intake, Goal, ClarificationRequest, ClarificationAnswer, ContractSeed, ContractDraft, ApprovedContract, and WorkItem DTO/value types plus the ContractDraft update, ready_for_approval, and approval request DTOs under apps/server/internal/spine. The server has a bounded durable IntakeRecord / Goal / ContractSeed / ContractDraft / ApprovedContract / EventLog slice plus in-memory WorkItem planning, but there is still no standalone Project Spine package or complete production state store.
  organization_context:
    name: Organization Context
    status: prototype
    truth_owner: docs/adr/ADR-0010-organization-project-repo-binding-persistence-boundary.md
    implementation_paths:
      - apps/server/internal/spine/project_context.go
      - apps/server/internal/store/project_context_store.go
      - apps/server/internal/seed
      - apps/server/internal/postgres/migrations/00001_init.sql
    public_claim_allowed: false
    notes: User/Organization/Membership/Project/RepoBinding MVP boundary now has server-local types, a UUID-backed init migration, a Squirrel-backed upsert store, a Squirrel-backed RepoBinding context lookup, deterministic UUIDv7 dev seed, and intake validation wiring that derives organization context for IntakeRecord and Goal. It does not implement auth, onboarding, CRUD endpoints, VcsConnection, RepositoryRecord, or provider integration.
  server_persistence:
    name: Server Persistence
    status: prototype
    truth_owner: docs/adr/ADR-0010-organization-project-repo-binding-persistence-boundary.md
    implementation_paths:
      - apps/server/go.mod
      - apps/server/go.sum
      - apps/server/README.md
      - apps/server/cmd/goalrail-server
      - apps/server/internal/config
      - apps/server/internal/postgres
      - apps/server/internal/store/project_context_store.go
      - apps/server/internal/store/postgres_intake_store.go
      - apps/server/internal/store/postgres_goal_store.go
      - apps/server/internal/store/postgres_contract_seed_store.go
      - apps/server/internal/store/postgres_contract_draft_store.go
      - apps/server/internal/store/postgres_approved_contract_store.go
      - apps/server/internal/store/postgres_event_log.go
      - apps/server/internal/seed
    public_claim_allowed: false
    notes: pgx + Squirrel + goose foundation exists for the project-context tables, IntakeRecord, Goal, ContractSeed, ContractDraft creation/update/ready_for_approval, ApprovedContract approval, and EventLog persistence, plus deterministic UUIDv7 dev seed. Runtime SQL in the stores is built through Squirrel and executed through pgx/pgxpool. Goose migrations are raw SQL. Intake uses Postgres to validate Project / RepoBinding context, derive organization_id, persist IntakeRecord, persist promoted Goal state, persist ContractSeed, ContractDraft creation/update/ready_for_approval state, ApprovedContract approval snapshots, and append durable audit events. Postgres-backed intake create, Goal promotion, Goal readiness, ContractSeed creation, ContractDraft creation/update, ContractDraft ready_for_approval, and ApprovedContract approval writes share transactions with their expected event appends. Clarification request/answer storage remains in-memory. WorkItem planning storage is in-memory only in this slice; no work_items table or migration exists.
  product_concept:
    name: Product Concept
    status: docs_only
    truth_owner: docs/product/GOALRAIL_PRODUCT_CONCEPT.md
    implementation_paths: []
    public_claim_allowed: false
    notes: Canonical product thesis exists in docs only.
  contract_lifecycle:
    name: Contract Lifecycle
    status: prototype
    truth_owner: docs/product/GOALRAIL_OPERATING_MODEL.md
    implementation_paths:
      - apps/server/internal/contractseed
      - apps/server/internal/contract
      - apps/server/internal/contractdraft
      - apps/server/internal/approvedcontract
      - apps/server/internal/spine/contract.go
      - apps/server/internal/store/contract_store.go
      - apps/server/internal/store/contract_seed_store.go
      - apps/server/internal/store/contract_draft_store.go
      - apps/server/internal/store/approved_contract_store.go
      - apps/server/internal/store/postgres_contract_store.go
      - apps/server/internal/store/postgres_contract_seed_store.go
      - apps/server/internal/store/postgres_contract_draft_store.go
      - apps/server/internal/store/postgres_approved_contract_store.go
      - apps/server/internal/postgres/migrations/00001_init.sql
    public_claim_allowed: false
    notes: The smallest public Contract aggregate boundary is implemented as server-local spine type plus in-memory and Postgres stores, and the public /v1/contracts lifecycle façade now exists. POST /v1/contracts creates Contract(draft) from a ready Goal by composing internal ContractSeed(created) and ContractDraft(draft) creation; GET/PATCH/submissions/approvals operate by stable public contract_id and resolve current internal lifecycle records. ContractSeed, ContractDraft, and ApprovedContract remain internal lifecycle records; the previous public contract-seeds / contract-drafts lifecycle routes are no longer registered. The editable init migration includes contracts plus contract_id links on lifecycle tables. WorkItem planning remains under task_shaping as an in-memory non-executable prototype; runner, gate, and proof remain unimplemented.
  task_shaping:
    name: Task Shaping
    status: prototype
    truth_owner: docs/product/GOALRAIL_MVP_BLUEPRINT.md
    implementation_paths:
      - apps/server/internal/spine/work_item.go
      - apps/server/internal/workitem
      - apps/server/internal/store/work_item_store.go
      - apps/server/internal/httpserver/work_item.go
    public_claim_allowed: false
    notes: WorkItem planning prototype exists as a server-owned non-executable planning boundary from approved public Contract to exactly one WorkItem(planned) per internal ApprovedContract snapshot in simple v0, exposed publicly as `POST /v1/contracts/{id}/tasks` where `{id}` is stable public contract_id. WorkItemStore is in-memory only; no work_items migration exists. It resolves Contract(approved), loads approved_snapshot_id internally, appends work_item.created, and guards repeated planning with 409 already_planned. ADR-0019 now documents the target direction for richer repo-aware planning as worker/controller-assisted WorkItemPlanningRequest and WorkItemPlanProposal flow, with explicit API-server validation and acceptance before canonical WorkItems are persisted; future public URLs should use `plans` and `proposals` rather than long internal planning type names. Canonical WorkItem writes remain API-server-owned. No planning request, proposal, acceptance, worker/controller, runner-backed planner, assignment, claiming, execution, Run, receipt, GateDecision, or Proof implementation exists yet.
  runtime_registry:
    name: Runtime Registry
    status: planned
    truth_owner: docs/product/GOALRAIL_MVP_BLUEPRINT.md
    implementation_paths: []
    public_claim_allowed: false
    notes: Planned integration surface only.
  primary_runtime_adapter:
    name: Primary Runtime Adapter
    status: planned
    truth_owner: docs/adr/ADR-0001-runtime-neutral-cli-first.md
    implementation_paths: []
    public_claim_allowed: false
    notes: CLI-first adapter boundary exists as ADR; no adapter code yet.
  runner_checkout:
    name: Runner Checkout Boundary
    status: docs_only
    truth_owner: docs/adr/ADR-0008-runner-checkout-boundary.md
    implementation_paths: []
    public_claim_allowed: false
    notes: ADR-0008 defines repository checkout, workspace preparation, code inspection, and check execution behind a dedicated runner boundary. It documents hosted and customer-hosted runner modes; the first prototype direction is hosted-only read-only ephemeral checkout with a checkout receipt, using pull/poll-based job leasing. Customer-hosted runner remains documented but unimplemented. No runner code exists yet.
  advisory_panel:
    name: Advisory Panel
    status: planned
    truth_owner: docs/adr/ADR-0002-single-writer-and-advisory-panels.md
    implementation_paths: []
    public_claim_allowed: false
