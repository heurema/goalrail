schema_version: goalrail.components.v0
updated_at: 2026-05-07
authority: operational
status_anchor: true
components:
  project_spine:
    name: Project Spine
    status: docs_only
    truth_owner: docs/PROJECT_SPINE_SCHEMA.md
    implementation_paths: []
    public_claim_allowed: false
    notes: Canonical schema note exists. The MVP uses direct RepoBinding before RepositoryRecord, and RepoBinding stores the repo reference directly. The CLI has a local internal DTO subset under apps/cli/internal/spine, and the server now has local Installation, Organization/Project/RepoBinding context, RepositoryContextSnapshot, password credential/session, intake, Goal, ClarificationRequest, ClarificationAnswer, ContractSeed, ContractDraft, ApprovedContract, and WorkItem DTO/value types plus the ContractDraft update, ready_for_approval, and approval request DTOs under apps/server/internal/spine. The server has a bounded durable Installation / Organization / Project / RepoBinding / RepositoryContextSnapshot / auth credential/session / IntakeRecord / Goal / ClarificationRequest / ClarificationAnswer / ContractSeed / ContractDraft / ApprovedContract / WorkItem / EventLog slice, but there is still no standalone Project Spine package or complete production state store.
  organization_context:
    name: Organization Context
    status: prototype
    truth_owner: docs/adr/ADR-0010-organization-project-repo-binding-persistence-boundary.md
    implementation_paths:
      - apps/server/internal/spine/project_context.go
      - apps/server/internal/repositoryinit
      - apps/server/internal/repositorycontext
      - apps/server/internal/repobinding
      - apps/server/internal/httpserver/repo_binding.go
      - apps/server/internal/httpserver/repository_init.go
      - apps/server/internal/httpserver/repository_context_snapshot.go
      - apps/server/internal/store/project_context_store.go
      - apps/server/internal/seed
      - apps/server/internal/postgres/migrations/00001_init.sql
    public_claim_allowed: false
    notes: Installation/User/Organization/Membership/Project/RepoBinding MVP boundary now has server-local types, a UUID-backed init migration, a Squirrel-backed upsert/create store, Squirrel-backed Project and RepoBinding context lookups, deterministic UUIDv7 dev seed, intake validation wiring that derives organization context for IntakeRecord and Goal, an authenticated read-only `GET /v1/organizations/{organization_id}/repository-context` endpoint for metadata-only active Project + active RepoBinding visibility, a narrow authenticated `POST /v1/projects/{project_id}/repo-bindings/init` endpoint for low-level server-owned metadata-only RepoBinding initialization, a composite authenticated `POST /v1/init/repository-context` endpoint that initializes repository context inside the authenticated user's existing active Organization, and an authenticated `POST /v1/repo-bindings/{repo_binding_id}/context-snapshots` endpoint for metadata-only init-time project inventory snapshots. The init migration includes `installations`, `organizations.installation_id`, installation-scoped organization slug uniqueness, an installation mode check limited to `self_hosted` and `saas`, `repo_bindings.workflow_base_branch`, an organization-wide partial unique index on active RepoBindings by provider plus repository full name, and `repository_context_snapshots` with idempotency by RepoBinding plus fingerprint. The composite init endpoint does not create Organizations or infer GoalRail Organizations from Git providers; it creates or reuses one repo-backed Project per repository by deterministic provider/full-name slug, reuses an existing active RepoBinding for the same repository in the Organization, and prevents duplicate active bindings for the same repository. Plain CLI init records a bounded local metadata inventory snapshot after successful repository-context init. The low-level RepoBinding init endpoint derives Organization from Project, stores `workflow_base_branch`, returns same-repository init idempotently, rejects different active repository bindings for the same Project, and appends `repo_binding.initialized` transactionally on create. It does not implement onboarding, public Organization creation, full CRUD endpoints, provider connection, RepositoryRecord, provider integration, deploy keys, repository clone, readiness/audit scoring, audit queue, runner, gate, or proof.
  auth_credentials:
    name: Auth Credentials
    status: prototype
    truth_owner: docs/adr/ADR-0023-user-bootstrap-auth-and-cli-login-boundary.md
    implementation_paths:
      - apps/server/go.mod
      - apps/server/go.sum
      - apps/server/internal/auth
      - apps/server/internal/auth/password
      - apps/server/internal/bootstrapowner
      - apps/server/internal/spine/auth.go
      - apps/server/internal/store/postgres_auth_store.go
      - apps/server/internal/postgres/migrations/00001_init.sql
    public_claim_allowed: false
    notes: Smallest ADR-0023 credential/session, server auth API, and CLI browser-loopback auth foundation exists. The editable init migration keeps password material out of `users` in `user_password_credentials`, represents first-login `must_change_password` and optional `password_changed_at`, adds `user_sessions` as an opaque refresh-token/session store with server-owned `active`, `revoked`, and `expired` state, and adds `cli_auth_codes` for short-lived one-time CLI authorization grants stored by hash with S256 code challenge metadata. Server-local spine types exist for password credentials, user sessions, session state, and CLI auth codes. `apps/server/internal/auth/password` hashes and verifies passwords with Argon2id PHC-style strings using cryptographic random salts and constant-time comparison. `apps/server/internal/auth` implements narrow HMAC-SHA256 JWT access-token signing/validation with identity/session claims only, opaque refresh-token generation/hash storage, email/password login, browser-loopback CLI login code issuance that rejects `must_change_password` credentials before code creation, CLI code exchange that requires a matching verifier, refresh without refresh-token rotation, authenticated password change, bearer-token logout, and current-user profile lookup. ADR-0027 defines the Organization user-management direction now implemented on the backend: regular users are created through Console-backed server API, not CLI user creation; canonical identity remains `User`; Organization access remains `OrganizationMembership`; temporary passwords are backend-generated, shown once, never persisted in plaintext, never logged, never returned from list/get endpoints, and never stored in browser storage; first-login password change remains mandatory. The server-rendered `/cli/login` HTML page is a temporary CLI auth bridge for `goalrail login <server_url>` localhost loopback, not the product web console login UI; `apps/web/console` now consumes the same server auth endpoints through a bounded multilingual React auth flow, and the main `https://goalrail.dev` deployment now routes it to `https://api.goalrail.dev` through the external `11me/infra` Flux GitOps path. `PostgresAuthStore` builds Squirrel-backed credential/session and CLI auth code SQL including refresh-token hash lookup, one-time code hash lookup/consumption, S256 challenge persistence, and user plus active primary OrganizationMembership reads needed by auth. `apps/server/internal/bootstrapowner` implements the smallest flag-driven self-hosted owner bootstrap command path. No public registration, invite/reset email flow, SaaS onboarding, organization creation API, refresh-token rotation, SSO/OIDC, keychain integration, Organization / Project / RepoBinding selection, `goalrail users create` command, runner, gate, proof, or generic queue behavior exists.
  server_persistence:
    name: Server Persistence
    status: prototype
    truth_owner: docs/adr/ADR-0010-organization-project-repo-binding-persistence-boundary.md
    implementation_paths:
      - apps/server/go.mod
      - apps/server/go.sum
      - apps/server/README.md
      - apps/server/cmd/goalrail-server
      - apps/server/internal/config
      - apps/server/internal/postgres
      - apps/server/internal/store/project_context_store.go
      - apps/server/internal/store/postgres_intake_store.go
      - apps/server/internal/store/postgres_goal_store.go
      - apps/server/internal/store/postgres_contract_seed_store.go
      - apps/server/internal/store/postgres_contract_draft_store.go
      - apps/server/internal/store/postgres_approved_contract_store.go
      - apps/server/internal/store/postgres_clarification_store.go
      - apps/server/internal/store/postgres_work_item_plan_store.go
      - apps/server/internal/store/postgres_work_item_plan_lease_store.go
      - apps/server/internal/store/postgres_work_item_store.go
      - apps/server/internal/store/postgres_auth_store.go
      - apps/server/internal/store/postgres_event_log.go
      - apps/server/internal/seed
    public_claim_allowed: false
    notes: pgx + Squirrel + goose foundation exists for the Installation and project-context tables, auth credential/session/CLI auth code tables, IntakeRecord, Goal, ClarificationRequest, ClarificationAnswer, ContractSeed, ContractDraft creation/update/ready_for_approval, ApprovedContract approval, WorkItem plan/lease/proposal/acceptance storage, and EventLog persistence, plus deterministic UUIDv7 dev seed. Runtime SQL in the stores is built through Squirrel and executed through pgx/pgxpool. Goose migrations are raw SQL. Structured DB config is provided through GOALRAIL_DATABASE_HOST / PORT / NAME / USER / PASSWORD / SSLMODE; host, name, user, and password are required before Postgres opens. Production product/auth route wiring returns `503 database_not_configured` without DB config instead of using in-memory canonical state. RepoBinding init, repository-context init, and Intake use Postgres to validate Project / RepoBinding context, derive organization_id, persist canonical state, and append durable events where current flows require events. Intake persists IntakeRecord, promoted Goal state, ClarificationRequest and ClarificationAnswer state, ContractSeed, ContractDraft creation/update/ready_for_approval state, ApprovedContract approval snapshots, WorkItemPlan records, WorkItemPlanLease records with hashed tokens, WorkItemPlanProposal records, accepted WorkItem(planned) records, and durable audit events. Auth persistence covers password credential/session upsert and lookup plus hashed CLI auth code create, lookup, and one-time consumption primitives; login business logic stays in `apps/server/internal/auth`. Postgres-backed repository-context Project creation, RepoBinding init create, intake create, Goal promotion, Goal readiness, ClarificationRequest creation, ClarificationAnswer recording, answer application, ContractSeed creation, ContractDraft creation/update, ContractDraft ready_for_approval, ApprovedContract approval, WorkItemPlan lease acquisition, proposal submission with lease completion, and proposal acceptance WorkItem creation/event append writes share transactions where the current flows require atomic state transitions.
  intent_clarification:
    name: Intent Clarification
    status: prototype
    truth_owner: docs/adr/ADR-0007-clarification-request-boundary.md
    implementation_paths:
      - apps/server/internal/spine/clarification.go
      - apps/server/internal/clarification
      - apps/server/internal/httpserver/clarification.go
      - apps/server/internal/store/postgres_clarification_store.go
      - apps/server/internal/postgres/migrations/00001_init.sql
      - apps/server/internal/app/wiring.go
    public_claim_allowed: false
    notes: ClarificationRequest and ClarificationAnswer are server-owned intent-plane prototype objects. The lower-level public routes remain `POST /v1/goals/{id}/clarifications`, `POST /v1/clarifications/{id}/answers`, and `POST /v1/answers/{id}/applications`; Slice C adds authenticated `POST /v1/clarifications/{id}/answers/continuation` for agent-facing answer submission plus next-action return. With structured Postgres configuration present, request and answer state is durable in Postgres; request creation stores the open request and appends `clarification.requested` transactionally; answer recording stores the answer, marks the request answered, and appends events transactionally; answer application marks the answer applied, updates Goal hints, and appends events transactionally. The continuation answer route resolves ClarificationRequest -> Goal, enforces active OrganizationMembership / Goal organization ownership before mutation, records one canonical answer, applies allowed Goal hint mappings, runs explicit readiness reconciliation, and returns a Goal continuation envelope. Already answered requests return an explicit conflict instead of creating duplicate canonical answers. Without DB config, production server route wiring returns `503 database_not_configured` instead of using in-memory product state. The old map-backed clarification stores were removed from `apps/server/internal/store`; tests use package-local fakes where needed. The flow does not create Contract/Plan/Proposal/Task/WorkItem/Run/GateDecision/Proof, start execution, checkout repositories, assign or claim work, or add queue/outbox/runtime registry behavior.
  product_concept:
    name: Product Concept
    status: docs_only
    truth_owner: docs/product/GOALRAIL_PRODUCT_CONCEPT.md
    implementation_paths: []
    public_claim_allowed: false
    notes: Canonical product thesis exists in docs only.
  contract_lifecycle:
    name: Contract Lifecycle
    status: prototype
    truth_owner: docs/product/GOALRAIL_OPERATING_MODEL.md
    implementation_paths:
      - apps/server/internal/contractseed
      - apps/server/internal/contract
      - apps/server/internal/contractdraft
      - apps/server/internal/approvedcontract
      - apps/server/internal/spine/contract.go
      - apps/server/internal/store/postgres_contract_store.go
      - apps/server/internal/store/postgres_contract_seed_store.go
      - apps/server/internal/store/postgres_contract_draft_store.go
      - apps/server/internal/store/postgres_approved_contract_store.go
      - apps/server/internal/postgres/migrations/00001_init.sql
    public_claim_allowed: false
    notes: The smallest public Contract aggregate boundary is implemented as server-local spine type plus Postgres stores, and the public /v1/contracts lifecycle façade now exists. Authenticated POST /v1/contracts creates or returns Contract(draft) from a ready Goal by enforcing active OrganizationMembership / Goal organization ownership plus CLI-supplied expected project/repo_binding marker matches and composing internal ContractSeed(created) plus ContractDraft(draft) creation. Authenticated PATCH /v1/contracts/{id} updates only current ContractDraft proposed fields after active OrganizationMembership / Contract organization verification and optional expected project/repo_binding marker validation, derives the audit actor from the authenticated user, rejects empty/blank update values, preserves draft state, and appends contract_draft.updated. Authenticated POST /v1/contracts/{id}/submissions marks the current draft ready_for_approval after active OrganizationMembership / Contract organization verification, optional expected project/repo_binding marker validation, server-derived marked_by audit identity, and completeness checks. Authenticated POST /v1/contracts/{id}/approvals creates an immutable ApprovedContract snapshot after active OrganizationMembership / Contract organization verification, optional expected project/repo_binding marker validation, server-derived approved_by audit identity, ready_for_approval state, and approval completeness checks. Repeated calls for the same Goal return the existing Contract draft handle instead of creating duplicate draft state, and repeated approval returns an explicit conflict. GET/PATCH/submissions/approvals operate by stable public contract_id and resolve current internal lifecycle records. ContractSeed, ContractDraft, and ApprovedContract remain internal lifecycle records; the previous public contract-seeds / contract-drafts lifecycle routes and direct public task creation route are no longer registered. The old map-backed contract lifecycle stores were removed from `apps/server/internal/store`; tests use package-local fakes where needed. The editable init migration includes contracts plus contract_id links on lifecycle tables. WorkItem planning remains under task_shaping as a non-executable plan/proposal/acceptance boundary; runner, gate, and proof remain unimplemented.
  task_shaping:
    name: Task Shaping
    status: prototype
    truth_owner: docs/product/GOALRAIL_MVP_BLUEPRINT.md
    implementation_paths:
      - apps/server/internal/spine/work_item.go
      - apps/server/internal/spine/work_item_plan.go
      - apps/server/internal/workitem
      - apps/server/internal/workitemplan
      - apps/server/internal/store/postgres_work_item_store.go
      - apps/server/internal/store/postgres_work_item_plan_store.go
      - apps/server/internal/httpserver/work_item.go
      - apps/server/internal/httpserver/work_item_plan.go
      - apps/server/internal/postgres/migrations/00001_init.sql
    public_claim_allowed: false
    notes: "WorkItem planning exists as a server-owned non-executable control-plane boundary from approved public Contract to WorkItemPlan(queued/leased/proposal_submitted/accepted), WorkItemPlanLease(active/completed/expired), WorkItemPlanProposal(submitted), explicit acceptance, and one or more canonical WorkItem(planned) records. Public routes are `POST /v1/contracts/{id}/plans`, `GET /v1/plans/{id}`, `POST /v1/plans/leases`, `GET /v1/plans/leases/{id}`, `PATCH /v1/plans/leases/{id}`, `POST /v1/plans/{id}/proposals`, `GET /v1/proposals/{id}`, `POST /v1/proposals/{id}/acceptance`, and `GET /v1/tasks/{id}`. Direct public `POST /v1/contracts/{id}/tasks` is removed. Public plan creation is authenticated, derives `requested_by` from the authenticated user, enforces Organization ownership plus optional project/repo expectations, and create-or-returns one plan per Contract. WorkItem plans, leases, proposals, and accepted WorkItems are durable in Postgres when structured database config is present; production server wiring returns `503 database_not_configured` without DB config instead of using in-memory product state. The old map-backed WorkItem/WorkItemPlan stores were removed from `apps/server/internal/store`; tests use package-local fakes where needed. Accepted WorkItems carry plan_id and proposal_id. There is no plan/proposal/task list/search endpoint and no worker lease list/search endpoint. Proposal submission requires `lease_id` plus `lease_token`, stores proposals through the API server, and marks the lease completed. Proposal acceptance appends work_item.created transactionally with WorkItem writes when Postgres is configured. Canonical WorkItem writes remain API-server-owned; workers/planners submit proposals through the API and do not write WorkItems directly to the DB. ADR-0021's typed WorkItemPlan pull lease boundary is implemented as a server API/persistence slice: `WorkItemPlan(state=queued)` remains the typed planning queue item, `WorkItemPlanLease` records reserve plans through API-server-owned pull leasing, and raw lease tokens are returned only once on create and stored only as hashes. A minimal API-only planning worker now exists under `apps/worker`, and checkout preparation is now a separate runner_checkout sidecar boundary; planning still does not assign, claim, execute, create Run, GateDecision, Proof, generic queue, outbox, broker, or runtime registry behavior."
  planning_worker:
    name: Planning Worker
    status: prototype
    truth_owner: docs/adr/ADR-0024-minimal-planning-worker-loop-boundary.md
    implementation_paths:
      - apps/worker/go.mod
      - apps/worker/cmd/goalrail-worker
      - apps/worker/internal/planningworker
    public_claim_allowed: false
    notes: Minimal API-only `goalrail-worker` prototype exists under `apps/worker`. It polls `POST /v1/plans/leases`, exits cleanly on no-work when run with `--once`, fetches one leased plan through `GET /v1/plans/{id}`, submits one deterministic development-mode proposal through `POST /v1/plans/{id}/proposals` with `lease_id` plus `lease_token`, and repeats unless `--once` is set. Startup supports server URL, worker ID, poll interval, and lease TTL through flags/env. Raw lease tokens are used only in memory for the proposal submission path and are not logged or persisted by the worker. The worker has local API DTOs and must not import `apps/server/internal`, Postgres/store packages, or command execution packages. The worker is not a runner, does not accept proposals, does not create WorkItems directly, does not assign or claim WorkItems, does not checkout repositories, does not run commands, does not start Runs, does not submit receipts, does not write GateDecision, does not create Proof, and does not add queue, outbox, worker registry, or runtime registry behavior.
