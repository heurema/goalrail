components:
  project_spine:
    name: Project Spine
    status: docs_only
    truth_owner: docs/PROJECT_SPINE_SCHEMA.md
    implementation_paths: []
    public_claim_allowed: false
    notes: Canonical schema note exists. The MVP uses direct RepoBinding before RepositoryRecord, and RepoBinding stores the repo reference directly. The CLI has a local internal DTO subset under apps/cli/internal/spine, and the server now has local intake, Goal, ClarificationRequest, and ClarificationAnswer DTO/value types under apps/server/internal/spine. The server has a bounded durable IntakeRecord / Goal / EventLog slice, but there is still no standalone Project Spine package or production state store.
  organization_context:
    name: Organization Context
    status: prototype
    truth_owner: docs/adr/ADR-0010-organization-project-repo-binding-persistence-boundary.md
    implementation_paths:
      - apps/server/internal/spine/project_context.go
      - apps/server/internal/store/project_context_store.go
      - apps/server/internal/seed
      - apps/server/internal/postgres/migrations/00001_init.sql
    public_claim_allowed: false
    notes: User/Organization/Membership/Project/RepoBinding MVP boundary now has server-local types, a UUID-backed init migration, a Squirrel-backed upsert store, a Squirrel-backed RepoBinding context lookup, deterministic UUIDv7 dev seed, and intake validation wiring that derives organization context for IntakeRecord and Goal. It does not implement auth, onboarding, CRUD endpoints, VcsConnection, RepositoryRecord, or provider integration.
  server_persistence:
    name: Server Persistence
    status: prototype
    truth_owner: docs/adr/ADR-0010-organization-project-repo-binding-persistence-boundary.md
    implementation_paths:
      - apps/server/go.mod
      - apps/server/go.sum
      - apps/server/README.md
      - apps/server/cmd/goalrail-server
      - apps/server/internal/config
      - apps/server/internal/postgres
      - apps/server/internal/store/project_context_store.go
      - apps/server/internal/store/postgres_intake_store.go
      - apps/server/internal/store/postgres_goal_store.go
      - apps/server/internal/store/postgres_event_log.go
      - apps/server/internal/seed
    public_claim_allowed: false
    notes: pgx + Squirrel + goose foundation exists for the project-context tables, IntakeRecord, Goal, and intake/goal EventLog persistence, plus deterministic UUIDv7 dev seed. Runtime SQL in the stores is built through Squirrel and executed through pgx/pgxpool. Goose migrations are raw SQL. Intake uses Postgres to validate Project / RepoBinding context, derive organization_id, persist IntakeRecord, persist promoted Goal state, and append durable audit events. Clarification request/answer storage remains in-memory.
