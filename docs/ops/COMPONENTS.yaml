schema_version: goalrail.components.v0
updated_at: 2026-05-03
authority: operational
status_anchor: true
components:
  project_spine:
    name: Project Spine
    status: docs_only
    truth_owner: docs/PROJECT_SPINE_SCHEMA.md
    implementation_paths: []
    public_claim_allowed: false
    notes: Canonical schema note exists. The MVP uses direct RepoBinding before RepositoryRecord, and RepoBinding stores the repo reference directly. The CLI has a local internal DTO subset under apps/cli/internal/spine, and the server now has local Installation, Organization/Project/RepoBinding context, password credential/session, intake, Goal, ClarificationRequest, ClarificationAnswer, ContractSeed, ContractDraft, ApprovedContract, and WorkItem DTO/value types plus the ContractDraft update, ready_for_approval, and approval request DTOs under apps/server/internal/spine. The server has a bounded durable Installation / Organization / Project / RepoBinding / auth credential/session / IntakeRecord / Goal / ClarificationRequest / ClarificationAnswer / ContractSeed / ContractDraft / ApprovedContract / WorkItem / EventLog slice, but there is still no standalone Project Spine package or complete production state store.
  organization_context:
    name: Organization Context
    status: prototype
    truth_owner: docs/adr/ADR-0010-organization-project-repo-binding-persistence-boundary.md
    implementation_paths:
      - apps/server/internal/spine/project_context.go
      - apps/server/internal/store/project_context_store.go
      - apps/server/internal/seed
      - apps/server/internal/postgres/migrations/00001_init.sql
    public_claim_allowed: false
    notes: Installation/User/Organization/Membership/Project/RepoBinding MVP boundary now has server-local types, a UUID-backed init migration, a Squirrel-backed upsert store, a Squirrel-backed RepoBinding context lookup, deterministic UUIDv7 dev seed, and intake validation wiring that derives organization context for IntakeRecord and Goal. The init migration includes `installations`, `organizations.installation_id`, installation-scoped organization slug uniqueness, and an installation mode check limited to `self_hosted` and `saas`; the dev seed creates one `self_hosted` Installation with `public_base_url` set to `http://localhost:8080` before the dev Organization. It does not implement onboarding, CRUD endpoints, VcsConnection, RepositoryRecord, or provider integration.
  auth_credentials:
    name: Auth Credentials
    status: prototype
    truth_owner: docs/adr/ADR-0023-user-bootstrap-auth-and-cli-login-boundary.md
    implementation_paths:
      - apps/server/go.mod
      - apps/server/go.sum
      - apps/server/internal/auth/password
      - apps/server/internal/spine/auth.go
      - apps/server/internal/store/postgres_auth_store.go
      - apps/server/internal/postgres/migrations/00001_init.sql
    public_claim_allowed: false
    notes: Smallest ADR-0023 credential/session foundation exists. The editable init migration keeps password material out of `users` in `user_password_credentials`, represents first-login `must_change_password` and optional `password_changed_at`, and adds `user_sessions` as an opaque refresh-token/session store with server-owned `active`, `revoked`, and `expired` state plus expiry, revocation, and last-used timestamps. Server-local spine types exist for password credentials, user sessions, and session state. `apps/server/internal/auth/password` hashes and verifies passwords with Argon2id PHC-style strings using cryptographic random salts and constant-time comparison. `PostgresAuthStore` builds Squirrel-backed credential/session upsert and lookup SQL only. No login endpoint, JWT/access-token issuance, refresh endpoint, logout endpoint, bootstrap owner command, CLI login, web UI, public registration, invite/reset email flow, SaaS onboarding, organization creation API, SSO/OIDC, runner, gate, proof, or generic queue behavior exists.
  server_persistence:
    name: Server Persistence
    status: prototype
    truth_owner: docs/adr/ADR-0010-organization-project-repo-binding-persistence-boundary.md
    implementation_paths:
      - apps/server/go.mod
      - apps/server/go.sum
      - apps/server/README.md
      - apps/server/cmd/goalrail-server
      - apps/server/internal/config
      - apps/server/internal/postgres
      - apps/server/internal/store/project_context_store.go
      - apps/server/internal/store/postgres_intake_store.go
      - apps/server/internal/store/postgres_goal_store.go
      - apps/server/internal/store/postgres_contract_seed_store.go
      - apps/server/internal/store/postgres_contract_draft_store.go
      - apps/server/internal/store/postgres_approved_contract_store.go
      - apps/server/internal/store/postgres_clarification_store.go
      - apps/server/internal/store/postgres_work_item_plan_store.go
      - apps/server/internal/store/postgres_work_item_store.go
      - apps/server/internal/store/postgres_auth_store.go
      - apps/server/internal/store/postgres_event_log.go
      - apps/server/internal/seed
    public_claim_allowed: false
    notes: pgx + Squirrel + goose foundation exists for the Installation and project-context tables, auth credential/session tables, IntakeRecord, Goal, ClarificationRequest, ClarificationAnswer, ContractSeed, ContractDraft creation/update/ready_for_approval, ApprovedContract approval, WorkItem plan/proposal/acceptance storage, and EventLog persistence, plus deterministic UUIDv7 dev seed. Runtime SQL in the stores is built through Squirrel and executed through pgx/pgxpool. Goose migrations are raw SQL. Intake uses Postgres to validate Project / RepoBinding context, derive organization_id, persist IntakeRecord, persist promoted Goal state, persist ClarificationRequest and ClarificationAnswer state, persist ContractSeed, ContractDraft creation/update/ready_for_approval state, ApprovedContract approval snapshots, WorkItemPlan records, WorkItemPlanProposal records, accepted WorkItem(planned) records, and append durable audit events. Auth persistence is limited to password credential and session upsert/lookup primitives; it does not implement login business logic. Postgres-backed intake create, Goal promotion, Goal readiness, ClarificationRequest creation, ClarificationAnswer recording, answer application, ContractSeed creation, ContractDraft creation/update, ContractDraft ready_for_approval, ApprovedContract approval, and proposal acceptance WorkItem creation/event append writes share transactions with their expected event appends.
  intent_clarification:
    name: Intent Clarification
    status: prototype
    truth_owner: docs/adr/ADR-0007-clarification-request-boundary.md
    implementation_paths:
      - apps/server/internal/spine/clarification.go
      - apps/server/internal/clarification
      - apps/server/internal/httpserver/clarification.go
      - apps/server/internal/store/clarification_store.go
      - apps/server/internal/store/clarification_answer_store.go
      - apps/server/internal/store/postgres_clarification_store.go
      - apps/server/internal/postgres/migrations/00001_init.sql
      - apps/server/internal/app/wiring.go
    public_claim_allowed: false
    notes: ClarificationRequest and ClarificationAnswer are server-owned intent-plane prototype objects. The public routes remain `POST /v1/goals/{id}/clarifications`, `POST /v1/clarifications/{id}/answers`, and `POST /v1/answers/{id}/applications`. With GOALRAIL_DATABASE_DSN configured, request and answer state is durable in Postgres; request creation stores the open request and appends `clarification.requested` transactionally; answer recording stores the answer, marks the request answered, and appends events transactionally; answer application marks the answer applied, updates Goal hints, and appends events transactionally. Without DB, the same flow uses in-memory stores. The flow does not auto-run readiness, create Contract/Plan/Proposal/Task/WorkItem/Run/GateDecision/Proof, start execution, checkout repositories, assign or claim work, or add queue/outbox/runtime registry behavior.
  product_concept:
    name: Product Concept
    status: docs_only
    truth_owner: docs/product/GOALRAIL_PRODUCT_CONCEPT.md
    implementation_paths: []
    public_claim_allowed: false
    notes: Canonical product thesis exists in docs only.
  contract_lifecycle:
    name: Contract Lifecycle
    status: prototype
    truth_owner: docs/product/GOALRAIL_OPERATING_MODEL.md
    implementation_paths:
      - apps/server/internal/contractseed
      - apps/server/internal/contract
      - apps/server/internal/contractdraft
      - apps/server/internal/approvedcontract
      - apps/server/internal/spine/contract.go
      - apps/server/internal/store/contract_store.go
      - apps/server/internal/store/contract_seed_store.go
      - apps/server/internal/store/contract_draft_store.go
      - apps/server/internal/store/approved_contract_store.go
      - apps/server/internal/store/postgres_contract_store.go
      - apps/server/internal/store/postgres_contract_seed_store.go
      - apps/server/internal/store/postgres_contract_draft_store.go
      - apps/server/internal/store/postgres_approved_contract_store.go
      - apps/server/internal/postgres/migrations/00001_init.sql
    public_claim_allowed: false
    notes: The smallest public Contract aggregate boundary is implemented as server-local spine type plus in-memory and Postgres stores, and the public /v1/contracts lifecycle façade now exists. POST /v1/contracts creates Contract(draft) from a ready Goal by composing internal ContractSeed(created) and ContractDraft(draft) creation; GET/PATCH/submissions/approvals operate by stable public contract_id and resolve current internal lifecycle records. ContractSeed, ContractDraft, and ApprovedContract remain internal lifecycle records; the previous public contract-seeds / contract-drafts lifecycle routes and direct public task creation route are no longer registered. The editable init migration includes contracts plus contract_id links on lifecycle tables. WorkItem planning remains under task_shaping as a non-executable plan/proposal/acceptance boundary; runner, gate, and proof remain unimplemented.
  task_shaping:
    name: Task Shaping
    status: prototype
    truth_owner: docs/product/GOALRAIL_MVP_BLUEPRINT.md
    implementation_paths:
      - apps/server/internal/spine/work_item.go
      - apps/server/internal/spine/work_item_plan.go
      - apps/server/internal/workitem
      - apps/server/internal/workitemplan
      - apps/server/internal/store/work_item_store.go
      - apps/server/internal/store/work_item_plan_store.go
      - apps/server/internal/store/postgres_work_item_store.go
      - apps/server/internal/store/postgres_work_item_plan_store.go
      - apps/server/internal/httpserver/work_item.go
      - apps/server/internal/httpserver/work_item_plan.go
      - apps/server/internal/postgres/migrations/00001_init.sql
    public_claim_allowed: false
    notes: WorkItem planning exists as a server-owned non-executable control-plane boundary from approved public Contract to WorkItemPlan(queued), WorkItemPlanProposal(submitted), explicit acceptance, and one or more canonical WorkItem(planned) records. Public routes are `POST /v1/contracts/{id}/plans`, `GET /v1/plans/{id}`, `POST /v1/plans/{id}/proposals`, `GET /v1/proposals/{id}`, `POST /v1/proposals/{id}/acceptance`, and `GET /v1/tasks/{id}`. Direct public `POST /v1/contracts/{id}/tasks` is removed. WorkItem plans, proposals, and accepted WorkItems are durable in Postgres when GOALRAIL_DATABASE_DSN is configured, with in-memory fallback otherwise; accepted WorkItems carry plan_id and proposal_id. There is no plan/proposal/task list/search endpoint. Proposal acceptance appends work_item.created transactionally with WorkItem writes when Postgres is configured. Canonical WorkItem writes remain API-server-owned; workers/planners submit proposals through the API and do not write WorkItems directly to the DB. ADR-0021 accepts the future typed WorkItemPlan pull lease boundary as design only: `WorkItemPlan(state=queued)` is the typed planning queue item, future `WorkItemPlanLease` records reserve plans through API-server-owned pull leasing, and future planned routes are `POST /v1/plans/leases`, `GET /v1/plans/leases/{id}`, and `PATCH /v1/plans/leases/{id}`. No worker/controller, runner-backed planner, lease protocol, plan `leased` state, lease token handling, proposal lease-proof enforcement, assignment, claiming, execution, Run, receipt, GateDecision, Proof, checkout, generic queue, outbox, broker, or runtime registry implementation exists yet.
  runtime_registry:
    name: Runtime Registry
    status: planned
    truth_owner: docs/product/GOALRAIL_MVP_BLUEPRINT.md
    implementation_paths: []
    public_claim_allowed: false
    notes: Planned integration surface only.
  primary_runtime_adapter:
    name: Primary Runtime Adapter
    status: planned
    truth_owner: docs/adr/ADR-0001-runtime-neutral-cli-first.md
    implementation_paths: []
    public_claim_allowed: false
    notes: CLI-first adapter boundary exists as ADR; no adapter code yet.
  runner_checkout:
    name: Runner Checkout Boundary
    status: docs_only
    truth_owner: docs/adr/ADR-0008-runner-checkout-boundary.md
    implementation_paths: []
    public_claim_allowed: false
    notes: ADR-0008 defines repository checkout, workspace preparation, code inspection, and check execution behind a dedicated runner boundary. It documents hosted and customer-hosted runner modes; the first prototype direction is hosted-only read-only ephemeral checkout with a checkout receipt, using pull/poll-based job leasing. Customer-hosted runner remains documented but unimplemented. No runner code exists yet.
