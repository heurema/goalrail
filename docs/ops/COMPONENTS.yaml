  runner_checkout:
    name: Runner Checkout Boundary
    status: prototype
    truth_owner: docs/adr/ADR-0028-runner-checkout-instruction-receipt-boundary.md
    implementation_paths:
      - apps/server/internal/spine/checkout.go
      - apps/server/internal/checkout
      - apps/server/internal/httpserver/checkout.go
      - apps/server/internal/store/postgres_checkout_store.go
      - apps/server/internal/postgres/migrations/00001_init.sql
      - apps/cli/internal/workcmd
      - apps/runner/go.mod
      - apps/runner/cmd/goalrail-runner
      - apps/runner/internal/checkoutrunner
    public_claim_allowed: false
    notes: ADR-0008 defines repository checkout, workspace preparation, code inspection, and check execution behind a dedicated runner boundary. H1 implements the first checkout instruction plus workspace receipt prototype: authenticated `POST /v1/tasks/{id}/checkout-jobs` creates or returns one checkout job for `WorkItem(planned)` after active OrganizationMembership and project/repo expectation checks; bearer-authenticated runner-facing `POST /v1/checkout-jobs/leases` leases one queued checkout job from the authenticated OrganizationMembership organization with a one-time raw lease token; bearer-authenticated runner-facing `POST /v1/checkout-jobs/{id}/receipts` checks the checkout job organization before accepting bounded workspace metadata with lease proof and `raw_source_uploaded=false`. Checkout jobs and receipts are durable in Postgres when structured DB config is present. `goalrail work checkout prepare --task-id <task_id>` exposes the agent-facing preparation command and returns `runner_checkout_required` as the next unavailable step. A separate minimal `goalrail-runner` prototype lives under `apps/runner`, talks only to the API server with `GOALRAIL_RUNNER_BEARER_TOKEN`, polls checkout leases, and submits workspace receipts from configured local workspace metadata. The API server stores no repository secrets, does not clone repositories, and does not receive raw source bodies. The runner has local API DTOs and must not import `apps/server/internal`, Postgres/store packages, or command execution packages. H1 does not implement actual clone/fetch, provider credential storage, provider connection object, OAuth, provider client, assignment, claiming, arbitrary command execution, `Run`, execution receipt, gate, proof, or checkout receipt trust/attestation.
