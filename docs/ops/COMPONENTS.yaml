      - apps/web/pilot-intake-ru/server/cmd/goalrail-pilot-intake-ru
      - apps/web/pilot-intake-ru/server/internal/pilotlead
    public_claim_allowed: false
    notes: Shared web rules live under apps/web. Current web surfaces remain prototype/public packaging surfaces only; no Goalrail web product loop is implemented yet. apps/web/pilot-intake-ru is now the business-first RU pilot landing for pilot.goalrail.ru per D-0055 with ИИ-кодинг без хаоса, safe 2-week пилот ИИ-разработки, repository readiness, project context, controlled tasks, and verified result. The previous 5-step technical interactive walkthrough is demoted to internal / technical demo or checkpoint status in git history. The landing keeps D-0047 boundaries in force except for D-0056's narrow lead-capture endpoint: same-origin POST /api/pilot-lead may validate email, write/update a local JSONL lead record with notification_status, suppress duplicates for successfully notified, legacy processed, and in-flight rows, retry after notification_failed, notify a server-local direct recipient configured outside the repo with fallback to hello@goalrail.dev, send a server-installed daily previous-day digest when leads exist, use D-0059 Resend HTTPS mail transport with `skill7.dev` sender when the server-local API key is configured, omit user-agent from new lead rows, and provide a local dry-run-first JSONL purge command with 90-day default retention and bounded override. The repo source for this endpoint/digest is now a landing-owned Go sidecar under apps/web/pilot-intake-ru/server per D-0062, not the core apps/server product API, and the prior PHP source is no longer an active repo runtime. There is still no analytics, tracking, IP logging, fingerprinting, CRM, Google Sheets, cookies, sessions, LLM/API, repo provider integration, code execution, broad backend platform, chat UI, file upload, model selector, or real repository scan claim; reverse-proxy rate limiting remains operator-managed deployment posture, not committed repo-side server config. Direct mailto fallback remains. The active target domain remains pilot.goalrail.ru per D-0053, canonical metadata remains https://pilot.goalrail.ru/, and SSH static deployment remains the hosting path per D-0051. Operator-managed deployment and public-live smoke status for the RU pilot landing is recorded in docs/ops/PILOT_INTAKE_RU_DEPLOYMENT_WIRING.md and docs/ops/STATUS.md. apps/web/console-ru is live as a static RU console shell at https://console.goalrail.ru/ with canonical metadata, server-side TLS, public HTTPS smoke, login-only entry, three empty product surfaces, bottom-left Settings utility, Users add/edit UI in component state only, and no API, production auth, session, cookie, persistence, analytics, or product data loop; live status and smoke evidence are recorded in docs/ops/CONSOLE_RU_DEPLOYMENT_WIRING.md. This component map keeps web_surface as prototype/public packaging only and does not use the component status to claim a mature Goalrail web product loop. No backend beyond the pilot narrow endpoint/digest/mail-transport slice exists.
  cli_surface:
    name: CLI Surface
    status: prototype
    truth_owner: docs/product/GOALRAIL_MVP_BLUEPRINT.md
