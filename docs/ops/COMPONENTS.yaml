schema_version: goalrail.components.v0
updated_at: 2026-05-05
authority: operational
status_anchor: true
components:
  project_spine:
    name: Project Spine
    status: docs_only
    truth_owner: docs/PROJECT_SPINE_SCHEMA.md
    implementation_paths: []
    public_claim_allowed: false
    notes: Canonical schema note exists. The MVP uses direct RepoBinding before RepositoryRecord, and RepoBinding stores the repo reference directly. The CLI has a local internal DTO subset under apps/cli/internal/spine, and the server now has local Installation, Organization/Project/RepoBinding context, RepositoryContextSnapshot, password credential/session, intake, Goal, ClarificationRequest, ClarificationAnswer, ContractSeed, ContractDraft, ApprovedContract, and WorkItem DTO/value types plus the ContractDraft update, ready_for_approval, and approval request DTOs under apps/server/internal/spine. The server has a bounded durable Installation / Organization / Project / RepoBinding / RepositoryContextSnapshot / auth credential/session / IntakeRecord / Goal / ClarificationRequest / ClarificationAnswer / ContractSeed / ContractDraft / ApprovedContract / WorkItem / EventLog slice, but there is still no standalone Project Spine package or complete production state store.
  organization_context:
    name: Organization Context
    status: prototype
    truth_owner: docs/adr/ADR-0010-organization-project-repo-binding-persistence-boundary.md
    implementation_paths:
      - apps/server/internal/spine/project_context.go
      - apps/server/internal/repositoryinit
      - apps/server/internal/repositorycontext
      - apps/server/internal/repobinding
      - apps/server/internal/httpserver/repo_binding.go
      - apps/server/internal/httpserver/repository_init.go
      - apps/server/internal/httpserver/repository_context_snapshot.go
      - apps/server/internal/store/project_context_store.go
      - apps/server/internal/seed
      - apps/server/internal/postgres/migrations/00001_init.sql
    public_claim_allowed: false
    notes: Installation/User/Organization/Membership/Project/RepoBinding MVP boundary now has server-local types, a UUID-backed init migration, a Squirrel-backed upsert/create store, Squirrel-backed Project and RepoBinding context lookups, deterministic UUIDv7 dev seed, intake validation wiring that derives organization context for IntakeRecord and Goal, a narrow authenticated `POST /v1/projects/{project_id}/repo-bindings/init` endpoint for low-level server-owned metadata-only RepoBinding initialization, a composite authenticated `POST /v1/init/repository-context` endpoint that initializes repository context inside the authenticated user's existing active Organization, and an authenticated `POST /v1/repo-bindings/{repo_binding_id}/context-snapshots` endpoint for metadata-only init-time project inventory snapshots. The init migration includes `installations`, `organizations.installation_id`, installation-scoped organization slug uniqueness, an installation mode check limited to `self_hosted` and `saas`, `repo_bindings.workflow_base_branch`, an organization-wide partial unique index on active RepoBindings by provider plus repository full name, and `repository_context_snapshots` with idempotency by RepoBinding plus fingerprint. The composite init endpoint does not create Organizations or infer GoalRail Organizations from Git providers; it creates or reuses one repo-backed Project per repository by deterministic provider/full-name slug, reuses an existing active RepoBinding for the same repository in the Organization, and prevents duplicate active bindings for the same repository. Plain CLI init records a bounded local metadata inventory snapshot after successful repository-context init. The low-level RepoBinding init endpoint derives Organization from Project, stores `workflow_base_branch`, returns same-repository init idempotently, rejects different active repository bindings for the same Project, and appends `repo_binding.initialized` transactionally on create. It does not implement onboarding, public Organization creation, full CRUD endpoints, VcsConnection, RepositoryRecord, provider integration, deploy keys, repository clone, readiness/audit scoring, audit queue, runner, gate, or proof.
  auth_credentials:
    name: Auth Credentials
    status: prototype
    truth_owner: docs/adr/ADR-0023-user-bootstrap-auth-and-cli-login-boundary.md
    implementation_paths:
      - apps/server/go.mod
      - apps/server/go.sum
      - apps/server/internal/auth
      - apps/server/internal/auth/password
      - apps/server/internal/bootstrapowner
      - apps/server/internal/spine/auth.go
      - apps/server/internal/store/postgres_auth_store.go
      - apps/server/internal/postgres/migrations/00001_init.sql
    public_claim_allowed: false
    notes: Smallest ADR-0023 credential/session, server auth API, and CLI browser-loopback auth foundation exists. The editable init migration keeps password material out of `users` in `user_password_credentials`, represents first-login `must_change_password` and optional `password_changed_at`, adds `user_sessions` as an opaque refresh-token/session store with server-owned `active`, `revoked`, and `expired` state, and adds `cli_auth_codes` for short-lived one-time CLI authorization grants stored by hash with S256 code challenge metadata. Server-local spine types exist for password credentials, user sessions, session state, and CLI auth codes. `apps/server/internal/auth/password` hashes and verifies passwords with Argon2id PHC-style strings using cryptographic random salts and constant-time comparison. `apps/server/internal/auth` implements narrow HMAC-SHA256 JWT access-token signing/validation with identity/session claims only, opaque refresh-token generation/hash storage, email/password login, browser-loopback CLI login code issuance that rejects `must_change_password` credentials before code creation, CLI code exchange that requires a matching verifier, refresh without refresh-token rotation, authenticated password change, bearer-token logout, and current-user profile lookup. The server-rendered `/cli/login` HTML page is a temporary CLI auth bridge for `goalrail login <server_url>` localhost loopback, not the product web console login UI; `apps/web/console` now consumes the same server auth endpoints through a bounded multilingual React auth flow, and the main `https://goalrail.dev` deployment now routes it to `https://api.goalrail.dev` through the external `11me/infra` Flux GitOps path. `PostgresAuthStore` builds Squirrel-backed credential/session and CLI auth code SQL including refresh-token hash lookup, one-time code hash lookup/consumption, S256 challenge persistence, and user plus active primary OrganizationMembership reads needed by auth. `apps/server/internal/bootstrapowner` implements the smallest flag-driven self-hosted owner bootstrap command path. No public registration, admin user creation endpoint, invite/reset email flow, SaaS onboarding, organization creation API, refresh-token rotation, SSO/OIDC, keychain integration, Organization / Project / RepoBinding selection, runner, gate, proof, or generic queue behavior exists.
  server_persistence:
    name: Server Persistence
    status: prototype
    truth_owner: docs/adr/ADR-0010-organization-project-repo-binding-persistence-boundary.md
    implementation_paths:
      - apps/server/go.mod
      - apps/server/go.sum
      - apps/server/README.md
      - apps/server/cmd/goalrail-server
      - apps/server/internal/config
      - apps/server/internal/postgres
      - apps/server/internal/store/project_context_store.go
      - apps/server/internal/store/postgres_intake_store.go
      - apps/server/internal/store/postgres_goal_store.go
      - apps/server/internal/store/postgres_contract_seed_store.go
      - apps/server/internal/store/postgres_contract_draft_store.go
      - apps/server/internal/store/postgres_approved_contract_store.go
      - apps/server/internal/store/postgres_clarification_store.go
      - apps/server/internal/store/postgres_work_item_plan_store.go
      - apps/server/internal/store/postgres_work_item_store.go
      - apps/server/internal/store/postgres_auth_store.go
      - apps/server/internal/store/postgres_event_log.go
      - apps/server/internal/seed
    public_claim_allowed: false
    notes: pgx + Squirrel + goose foundation exists for the Installation and project-context tables, auth credential/session/CLI auth code tables, IntakeRecord, Goal, ClarificationRequest, ClarificationAnswer, ContractSeed, ContractDraft creation/update/ready_for_approval, ApprovedContract approval, WorkItem plan/proposal/acceptance storage, and EventLog persistence, plus deterministic UUIDv7 dev seed. Runtime SQL in the stores is built through Squirrel and executed through pgx/pgxpool. Goose migrations are raw SQL. Structured DB config is provided through GOALRAIL_DATABASE_HOST / PORT / NAME / USER / PASSWORD / SSLMODE; host, name, user, and password are required before Postgres opens. Production product/auth route wiring returns `503 database_not_configured` without DB config instead of using in-memory canonical state. RepoBinding init, repository-context init, and Intake use Postgres to validate Project / RepoBinding context, derive organization_id, persist canonical state, and append durable events where current flows require events. Intake persists IntakeRecord, promoted Goal state, ClarificationRequest and ClarificationAnswer state, ContractSeed, ContractDraft creation/update/ready_for_approval state, ApprovedContract approval snapshots, WorkItemPlan records, WorkItemPlanProposal records, accepted WorkItem(planned) records, and durable audit events. Auth persistence covers password credential/session upsert and lookup plus hashed CLI auth code create, lookup, and one-time consumption primitives; login business logic stays in `apps/server/internal/auth`. Postgres-backed repository-context Project creation, RepoBinding init create, intake create, Goal promotion, Goal readiness, ClarificationRequest creation, ClarificationAnswer recording, answer application, ContractSeed creation, ContractDraft creation/update, ContractDraft ready_for_approval, ApprovedContract approval, and proposal acceptance WorkItem creation/event append writes share transactions with their expected event appends.
  intent_clarification:
    name: Intent Clarification
    status: prototype
    truth_owner: docs/adr/ADR-0007-clarification-request-boundary.md
    implementation_paths:
      - apps/server/internal/spine/clarification.go
      - apps/server/internal/clarification
      - apps/server/internal/httpserver/clarification.go
      - apps/server/internal/store/postgres_clarification_store.go
      - apps/server/internal/postgres/migrations/00001_init.sql
      - apps/server/internal/app/wiring.go
    public_claim_allowed: false
    notes: ClarificationRequest and ClarificationAnswer are server-owned intent-plane prototype objects. The public routes remain `POST /v1/goals/{id}/clarifications`, `POST /v1/clarifications/{id}/answers`, and `POST /v1/answers/{id}/applications`. With structured Postgres configuration present, request and answer state is durable in Postgres; request creation stores the open request and appends `clarification.requested` transactionally; answer recording stores the answer, marks the request answered, and appends events transactionally; answer application marks the answer applied, updates Goal hints, and appends events transactionally. Without DB config, production server route wiring returns `503 database_not_configured` instead of using in-memory product state. The old map-backed clarification stores were removed from `apps/server/internal/store`; tests use package-local fakes where needed. The flow does not auto-run readiness, create Contract/Plan/Proposal/Task/WorkItem/Run/GateDecision/Proof, start execution, checkout repositories, assign or claim work, or add queue/outbox/runtime registry behavior.
