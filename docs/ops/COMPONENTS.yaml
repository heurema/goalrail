  server_surface:
    name: Server Surface
    status: prototype
    truth_owner: docs/adr/ADR-0004-go-server-boundary-and-selected-stack.md
    implementation_paths:
      - apps/server/go.mod
      - apps/server/README.md
      - apps/server/cmd/goalrail-server
      - apps/server/internal/app
      - apps/server/internal/config
      - apps/server/internal/httpserver
      - apps/server/internal/spine
      - apps/server/internal/intake
      - apps/server/internal/goal
      - apps/server/internal/clarification
      - apps/server/internal/contractseed
      - apps/server/internal/contractdraft
      - apps/server/internal/approvedcontract
      - apps/server/internal/store
      - apps/server/internal/postgres
      - apps/server/internal/seed
      - apps/server/internal/eventlog
      - apps/server/internal/health
      - apps/server/internal/version
    public_claim_allowed: false
    notes: Go server skeleton exists with canonical binary goalrail-server. It exposes health/version plus Postgres-backed source-neutral intake with Project / RepoBinding validation, Goal promotion, deterministic Goal readiness state, ContractSeed creation, ContractDraft creation/update/ready_for_approval, ApprovedContract approval, EventLog persistence, transactional canonical write + event append hardening, explicit re-check-after-applied-answers, and in-memory ClarificationRequest, ClarificationAnswer, and answer application prototypes. A Postgres foundation exists for the Organization / Project / RepoBinding context, with migrations, dev seed, and context lookup. Intake creates durable IntakeRecord only after repo binding context resolves and carries organization_id, project_id, and repo_binding_id; Goal promotion creates durable non-executable Goal only and preserves that context; Goal readiness updates persisted Goal state only with fixed reason codes and can be explicitly re-run after applied answers to mark ready_for_contract_seed. Durable events include intake.received, goal.created, intake.promoted_to_goal, goal.readiness_checked, readiness transition events, contract_seed.created, contract_draft.created, contract_draft.updated, contract_draft.marked_ready_for_approval, and contract.approved; for Postgres-backed intake create, Goal promotion, Goal readiness, ContractSeed creation, ContractDraft creation, ContractDraft update, ContractDraft ready_for_approval, and ApprovedContract approval, the canonical write and expected event appends share one transaction. ClarificationRequest creation creates an open request only from stored readiness reason codes; ClarificationAnswer recording stores answer evidence only and transitions the request to answered; answer application updates Goal intent-plane hints only, rejects raw-text goal.intent_owner mapping, and does not call readiness automatically. ContractSeed creation stores ContractSeed(created) in Postgres when DB is configured, does not mutate Goal state, and guards repeated creation with 409 already_seeded. ContractDraft creation stores ContractDraft(draft) in Postgres when DB is configured, does not mutate ContractSeed, and guards repeated creation with 409 already_drafted. ContractDraft update stores proposed-field updates in Postgres when DB is configured, requires updated_by as audit identity, keeps state=draft, and appends contract_draft.updated. ContractDraft ready_for_approval transitions complete drafts from draft to ready_for_approval in Postgres when DB is configured, requires marked_by as audit identity only, does not mutate proposed fields, and appends contract_draft.marked_ready_for_approval. ApprovedContract approval creates ApprovedContract(approved) snapshots from ready drafts in Postgres when DB is configured, requires approved_by, does not mutate ContractDraft, guards repeated approval with 409 already_approved, and appends contract.approved. Clarification request/answer state remains in-memory. There is no durable clarification storage, no automatic readiness re-check, no WorkItem creation, no gate/proof, no repo readiness, no auth, no workers, and no repository checkout.
