  start_assistant_worker:
    name: Start Assistant Worker
    status: prototype
    truth_owner: docs/ops/START_ASSISTANT_WORKER_ARCHITECTURE.md
    implementation_paths:
      - apps/workers/start-assistant
    public_claim_allowed: false
    notes: "Separate public-edge Worker package for the live `/start` assistant now exists under apps/workers/start-assistant. It owns the bounded `POST /api/start-chat` handler, validates JSON-only short public questions, refuses repo scan / code execution / file upload / private code / secret prompts before provider calls, can call OpenAI Responses API with file_search when Worker-side provider configuration is present, and includes dependency-free Node tests, a local mock dev server, minimal Wrangler config, manual public KB build/upload helper scripts under scripts/start-assistant, and an operator-triggered GitHub Actions public KB sync workflow. The route is live as the separate Cloudflare Worker route `goalrail.dev/api/start-chat*`, with verified Worker version `77b2dbc5-b7aa-42d0-b91b-3b313f8c6f50` and verified public KB revision `263075db460d762fe7fa1f09d30709bc68e8eb5c`. The KB sync workflow validates builds without secrets on PRs and relevant main pushes, and publishes only through workflow_dispatch, protected environment `start-assistant-kb-sync`, and deployment secrets. The worker is not part of apps/server and does not own canonical Goalrail state. This prototype does not add repo scan, GitHub OAuth, user uploads, code execution, sessions, CRM, analytics, tracking, chat history persistence, model selector, automatic push-to-live KB sync, or production secret values."
  web_surface:
    name: Web Surface
    status: prototype
    truth_owner: docs/product/GOALRAIL_MVP_BLUEPRINT.md
    implementation_paths:
      - apps/web/package.json
      - apps/web/package-lock.json
      - apps/web/README.md
      - apps/web/console
      - apps/web/demo-change-packet
      - apps/web/demo-change-packet-ru
      - apps/web/pilot-intake-ru
      - apps/web/pilot-intake-ru/server/go.mod
      - apps/web/pilot-intake-ru/server/cmd/goalrail-pilot-intake-ru
      - apps/web/pilot-intake-ru/server/internal/pilotlead
    public_claim_allowed: false
    notes: "Shared web rules live under apps/web. Current web surfaces remain prototype/public packaging surfaces only; no Goalrail goal-to-proof product loop is implemented yet. apps/web/pilot-intake-ru is the business-first RU pilot landing for pilot.goalrail.ru per D-0055 with ИИ-кодинг без хаоса, safe 2-week пилот ИИ-разработки, repository readiness, project context, controlled tasks, and verified result. The landing keeps D-0047 boundaries in force except for D-0056's narrow lead-capture endpoint, D-0058 daily digest, D-0059 Resend mail transport when configured, D-0061 notification-status retry semantics, and D-0065 retention/minimization guardrails. The repo source for that endpoint/digest is a landing-owned Go sidecar under apps/web/pilot-intake-ru/server per D-0062, not the core apps/server product API, and the prior PHP source is no longer an active repo runtime. Operator-managed deployment and public-live smoke status for the RU pilot landing is recorded in docs/ops/PILOT_INTAKE_RU_DEPLOYMENT_WIRING.md and docs/ops/STATUS.md. apps/web/console is now the single canonical multilingual EN/RU console source with static i18next resources, existing server login / optional first-login password change / `/v1/me` / logout flow, VITE_GOALRAIL_API_BASE_URL build-time API base URL support, in-memory access and refresh tokens only, no cookies, no token/profile/session browser-storage persistence, no locale browser-storage persistence, `goalrail.console.theme` as the only localStorage key, an ops-style Contracts surface that can load one real public Contract aggregate by explicit `contract_id` through `GET /v1/contracts/{id}`, structured empty Delivery Readiness and Proof surfaces, bottom-left Settings utility, Appearance theme picker, a public English `/start` route at `https://goalrail.dev/start` with same-origin assistant input for `POST /api/start-chat` plus static guided fallback, API-backed Organization Users list/create/edit/temporary-password reset using `/v1/me` organization context plus the ADR-0027 routes, and read-only Settings / Repository metadata using `GET /v1/organizations/{organization_id}/repository-context`. Users uses backend-aligned roles `owner`, `admin`, `member`, and `viewer`; `observer` is not a target role. User state is active/inactive, `must_change_password` is shown as credential status, generated temporary passwords are shown once from the create/reset response without browser storage persistence, and Settings / Users blocks self owner demotion, self membership deactivation, and self temporary-password reset while warning on edits to other owners. Settings / Repository shows server-owned Organization, active Project, and active RepoBinding metadata only; it does not claim provider authorization, checkout, readiness, proof, execution, or runner state. The console does not include a contract list/search endpoint, draft body/detail read endpoints, local demo contracts, or prefilled contract records. The main console deployment is now live at `https://goalrail.dev` with API base URL `https://api.goalrail.dev` through the external `11me/infra` Flux GitOps path; `/start` relies on external infra SPA fallback, and live smoke and routing evidence are recorded in docs/ops/CONSOLE_MAIN_DEPLOYMENT_WIRING.md. The old apps/web/console-ru workspace source has been removed, and `https://console.goalrail.ru/` remains a separate legacy RU static deployment. The demo sandbox remains separate at `https://demo.goalrail.dev`. The live main API currently relies on nginx ingress CORS as a temporary bridge because the pinned goalrail-server image predates the app-level CORS implementation; later infra cleanup should pin a post-PR-#120 server image, enable app-level CORS, and remove ingress CORS annotations in one change. This component map keeps web_surface as prototype/public packaging only and does not use the component status to claim a mature Goalrail web product loop. No public registration, SSO, invite/reset email, self-service password reset, password reset email delivery, SaaS onboarding, organization creation API, analytics, provider integration, repository catalog, runner, gate, proof, or backend beyond the pilot narrow endpoint/digest/mail-transport slice, existing core server auth, Organization user-management endpoints, read-only repository-context endpoint, explicit contract aggregate read by ID in the console, start-assistant worker route, and current deployment routing exists."
  cli_surface:
    name: CLI Surface
    status: prototype
    truth_owner: docs/product/GOALRAIL_MVP_BLUEPRINT.md
    implementation_paths:
      - apps/cli/go.mod
      - apps/cli/cmd/goalrail
      - apps/cli/internal/app
