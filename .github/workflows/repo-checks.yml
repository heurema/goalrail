name: repo-checks

on:
  pull_request:

permissions:
  contents: read

jobs:
  go:
    name: go (${{ matrix.module }})
    runs-on: ubuntu-latest
    timeout-minutes: 15
    strategy:
      fail-fast: false
      matrix:
        include:
          - module: apps/server
            build_target: ./cmd/goalrail-server
          - module: apps/cli
            build_target: ./cmd/goalrail
          - module: apps/web/pilot-intake-ru/server
            build_target: ./cmd/goalrail-pilot-intake-ru

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.26.x"
          cache-dependency-path: ${{ matrix.module }}/go.*

      - name: Test
        working-directory: ${{ matrix.module }}
        run: go test ./...

      - name: Vet
        working-directory: ${{ matrix.module }}
        run: go vet ./...

      - name: Build
        working-directory: ${{ matrix.module }}
        run: go build ${{ matrix.build_target }}

  web:
    name: web workspaces
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "24.x"
          cache: npm
          cache-dependency-path: apps/web/package-lock.json

      - name: Setup npm
        run: npm install -g npm@11.13.0

      - name: Install dependencies
        working-directory: apps/web
        run: npm ci

      - name: Install Linux RollDown native binding
        working-directory: apps/web
        run: npm install --no-save --package-lock=false @rolldown/binding-linux-x64-gnu@1.0.0-rc.17

      - name: Typecheck workspaces
        working-directory: apps/web
        run: npm run --workspaces --if-present typecheck

      - name: Test workspaces
        working-directory: apps/web
        run: npm run --workspaces --if-present test

      - name: Build workspaces
        working-directory: apps/web
        run: npm run --workspaces --if-present build
