name: Sync OpenAPI to site

# Keeps the public API reference on the goalrail website in sync with
# the spec generated here. When openapi.json changes on main, copy it
# into goalrail-site/public/openapi.json and open (or update) a PR there.
#
# Cross-repo writes can't use the workflow's own GITHUB_TOKEN (it's
# scoped to this repo), so we mint a short-lived token from the
# goalrail-ci GitHub App — the same App used by oss-regen-on-comment.yml
# — scoped to goalrail-site. The App must be installed on goalrail-site
# with contents + pull-requests write.
on:
  push:
    branches: [main]
    paths: [openapi.json]
  # Manual trigger for backfills / re-syncs after editing this workflow.
  workflow_dispatch:

# One sync at a time; a newer spec supersedes an in-flight run.
concurrency:
  group: sync-openapi-to-site
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  sync:
    name: Open sync PR on goalrail-site
    runs-on: ubuntu-latest
    # Skip cleanly on forks / installs where the App isn't configured,
    # rather than failing the token step with a confusing error.
    if: ${{ vars.GOALRAIL_BOT_APP_ID != '' }}
    env:
      SYNC_BRANCH: auto/openapi-sync
      TARGET_REPO: ${{ github.repository_owner }}/goalrail-site
    steps:
      - name: Checkout goalrail (spec source)
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          path: goalrail

      - name: Mint App token for goalrail-site
        id: app-token
        uses: actions/create-github-app-token@bcd2ba49218906704ab6c1aa796996da409d3eb1 # v3.2.0
        with:
          app-id: ${{ vars.GOALRAIL_BOT_APP_ID }}
          private-key: ${{ secrets.GOALRAIL_BOT_APP_KEY }}
          owner: ${{ github.repository_owner }}
          repositories: goalrail-site

      - name: Checkout goalrail-site (sync target)
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          repository: ${{ env.TARGET_REPO }}
          token: ${{ steps.app-token.outputs.token }}
          path: site

      - name: Copy spec into the site
        run: cp goalrail/openapi.json site/public/openapi.json

      # Commit + push to a fixed branch and open a PR if one isn't
      # already open. If a PR exists, the force-push updates it in place
      # — so repeated spec changes collapse into a single rolling PR.
      - name: Open or update sync PR
        working-directory: site
        env:
          GH_TOKEN: ${{ steps.app-token.outputs.token }}
        run: |
          if [ -z "$(git status --porcelain -- public/openapi.json)" ]; then
            echo "openapi.json already in sync — nothing to do."
            exit 0
          fi

          git config user.name "goalrail-ci[bot]"
          git config user.email "294685417+goalrail-ci[bot]@users.noreply.github.com"
          git switch -C "$SYNC_BRANCH"
          git add public/openapi.json
          git commit -m "chore(api): sync openapi.json from goalrail@${GITHUB_SHA:0:7}"
          git push --force origin "$SYNC_BRANCH"

          if [ -n "$(gh pr list --head "$SYNC_BRANCH" --state open --json number --jq '.[].number')" ]; then
            echo "PR already open for $SYNC_BRANCH — the force-push updated it."
            exit 0
          fi

          # Build the body with printf so YAML block indentation never
          # leaks leading spaces into the Markdown.
          short="${GITHUB_SHA:0:7}"
          body="$(printf 'Automated sync of `public/openapi.json` from [goalrail@`%s`](https://github.com/%s/commit/%s).\n\nGenerated by `.github/workflows/sync-openapi-to-site.yml`. Merging publishes the updated API reference at `/reference`.' "$short" "$GITHUB_REPOSITORY" "$GITHUB_SHA")"
          gh pr create \
            --base main \
            --head "$SYNC_BRANCH" \
            --title "chore(api): sync OpenAPI reference from goalrail" \
            --body "$body"
