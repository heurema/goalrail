name: docs-check

on:
  pull_request:

jobs:
  docs-check:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Compute changed files
        env:
          PR_BASE_SHA: ${{ github.event.pull_request.base.sha }}
          PR_HEAD_SHA: ${{ github.event.pull_request.head.sha }}
          RUNNER_TEMP: ${{ runner.temp }}
        run: |
          python3 - <<'PY'
          import os
          import subprocess
          from pathlib import Path

          base = os.environ["PR_BASE_SHA"]
          head = os.environ["PR_HEAD_SHA"]
          runner_temp = Path(os.environ["RUNNER_TEMP"])
          output_path = runner_temp / "goalrail-docs-changed-files.txt"

          result = subprocess.run(
              ["git", "diff", "--name-only", "--diff-filter=ACMRT", base, head],
              check=True,
              text=True,
              capture_output=True,
          )
          changed_files = [line.strip() for line in result.stdout.splitlines() if line.strip()]

          output_path.write_text("".join(f"{path}\n" for path in changed_files), encoding="utf-8")

          print(f"changed_files={len(changed_files)}")
          for path in changed_files:
              print(path)
          PY

      - name: Run fixture self-test
        env:
          RUNNER_TEMP: ${{ runner.temp }}
        shell: bash
        run: |
          set +e
          python3 tools/docs-check/docs_check.py \
            --fixtures tools/docs-check/fixtures \
            --self-test \
            --report-json "$RUNNER_TEMP/goalrail-docs-fixtures-report.json" \
            --report-md "$RUNNER_TEMP/goalrail-docs-fixtures-report.md"
          status=$?
          echo "--- fixture self-test report ---"
          cat "$RUNNER_TEMP/goalrail-docs-fixtures-report.md"
          exit $status

      - name: Run changed-files ratchet
        env:
          RUNNER_TEMP: ${{ runner.temp }}
        shell: bash
        run: |
          set +e
          python3 tools/docs-check/docs_check.py \
            --root . \
            --mode changed-files \
            --changed-files-file "$RUNNER_TEMP/goalrail-docs-changed-files.txt" \
            --report-json "$RUNNER_TEMP/goalrail-docs-check-report.json" \
            --report-md "$RUNNER_TEMP/goalrail-docs-check-report.md"
          status=$?
          echo "--- changed-files report ---"
          cat "$RUNNER_TEMP/goalrail-docs-check-report.md"
          exit $status
