apiVersion: v1
kind: Secret
metadata:
  name: goalrail-secrets
  labels:
    app: goalrail
type: Opaque
stringData:
  # Replace with your actual database connection string.
  DATABASE_URL: "postgresql+psycopg://goalrail:changeme@your-db-host:5432/goalrail"
  # Generate with: openssl rand -hex 32
  GOALRAIL_ACCOUNTS_COOKIE_SECRET: "changeme"
