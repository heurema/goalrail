apiVersion: v1
kind: ConfigMap
metadata:
  name: goalrail-config
  labels:
    app: goalrail
data:
  HOST: "0.0.0.0"
  PORT: "8000"
  ARTIFACT_DIR: "/data/artifacts"
  GOALRAIL_ADMIN_CREDENTIALS_PATH: "/data/admin-credentials"
  GOALRAIL_AUTH_ENABLED: "1"
  GOALRAIL_AUTH_PROVIDER: "accounts"
  GOALRAIL_ACCOUNTS_AUTO_OPEN: "0"
