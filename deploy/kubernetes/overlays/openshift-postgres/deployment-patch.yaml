apiVersion: apps/v1
kind: Deployment
metadata:
  name: goalrail
spec:
  template:
    spec:
      securityContext:
        runAsNonRoot: true
      containers:
        - name: goalrail
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop:
                - ALL
            seccompProfile:
              type: RuntimeDefault
