apiVersion: apps/v1
kind: Deployment
metadata:
  name: goalrail
spec:
  template:
    spec:
      serviceAccountName: goalrail
      containers:
        - name: goalrail
          volumeMounts:
            - name: openshell-gateway
              mountPath: /home/goalrail/.config/openshell
              readOnly: true
            - name: server-config
              mountPath: /data/server-config.yaml
              subPath: config.yaml
              readOnly: true
      volumes:
        - name: openshell-gateway
          secret:
            secretName: openshell-gateway-config
            optional: true
        - name: server-config
          configMap:
            name: goalrail-server-config
