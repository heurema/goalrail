apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namespace: goalrail

resources:
  - ../../base
  - server-config.yaml
  - gateway-networkpolicy.yaml
  - sandbox-rbac.yaml
  - sandbox-clusterrole.yaml
  - sandbox-clusterrolebinding.yaml

# Use the server image variant that includes the openshell SDK extra
# (built by CI with GOALRAIL_EXTRAS=openshell).
images:
  - name: ghcr.io/heurema/goalrail-server
    newName: ghcr.io/heurema/goalrail-server-openshell

patches:
  - path: configmap-patch.yaml
  - path: secret-patch.yaml
  - path: deployment-patch.yaml
