apiVersion: v1
kind: Secret
metadata:
  name: goalrail-secrets
type: Opaque
stringData:
  DATABASE_URL: "postgresql+psycopg://goalrail:changeme@your-db-host:5432/goalrail"
  # Generate with: openssl rand -hex 32
  GOALRAIL_ACCOUNTS_COOKIE_SECRET: "changeme"
  # --- LLM credentials injected into OpenShell sandboxes ------------------
  # The server reads these from env at provision time and injects them
  # into sandboxes via the sandbox.openshell.env list in config.yaml.
  # Set the ones your harness needs.
  ANTHROPIC_API_KEY: ""
  OPENAI_API_KEY: ""
  GEMINI_API_KEY: ""
