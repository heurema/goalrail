---
# CROSS-NAMESPACE binding: this RoleBinding lives in the runner namespace
# `goalrail-sandboxes` and grants the goalrail-sandbox-manager Role (also in
# `goalrail-sandboxes`) to the goalrail-server SA, which lives in the SEPARATE
# server namespace `goalrail`. A RoleBinding may reference a subject in another
# namespace, so the server gets runner-Pod management rights in
# `goalrail-sandboxes` ONLY — never in its own namespace. The subject namespace
# is set explicitly (NOT injected) so the binding is unambiguous. The runner SA
# is deliberately absent — runner Pods need no API access.
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: goalrail-sandbox-manager
  namespace: goalrail-sandboxes
  labels:
    app.kubernetes.io/name: goalrail
    app.kubernetes.io/component: server
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: goalrail-sandbox-manager
subjects:
  - kind: ServiceAccount
    name: goalrail-server
    namespace: goalrail
