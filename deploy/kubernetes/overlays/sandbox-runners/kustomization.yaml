apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

# On-demand runner-Pod sandbox provider, layered on the base server deploy.
# Two-namespace split (server in `goalrail`, runners in `goalrail-sandboxes`) — see
# README.md. No overlay-wide `namespace:`; each resource sets its own explicitly.

resources:
  - ../../base
  - serviceaccount-server.yaml # SA in goalrail (server runs as this)
  - namespace-sandboxes.yaml # the dedicated goalrail-sandboxes namespace
  - serviceaccount-runner.yaml # runner SA in goalrail-sandboxes
  - role.yaml # Role in goalrail-sandboxes (scoped Pod + Secret rights)
  - rolebinding.yaml # cross-ns binding: server SA → runner-ns Role
  - sandbox-config.yaml # server config (goalrail); points at runner ns
# The harness-credentials Secret (sandbox.kubernetes.secret_name, default
# goalrail-creds) is NOT checked in — create it out of band like the base
# OIDC secret (see README.md "Apply"). Prefer sealed-secrets/external-secrets.

# The base server image lacks the `kubernetes` extra, so a managed launch would
# fail to import the client. Build the server WITH it
# (`--build-arg GOALRAIL_EXTRAS=kubernetes`, see deploy/docker) and set it here.
images:
  - name: ghcr.io/heurema/goalrail-server
    newName: ghcr.io/REPLACE_ME/goalrail-server
    newTag: kubernetes

patches:
  - path: deployment-patch.yaml
