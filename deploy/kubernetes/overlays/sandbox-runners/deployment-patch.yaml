---
# Patch the base server Deployment so the kubernetes sandbox provider works:
#   1. Run as the `goalrail-server` ServiceAccount (bound by rolebinding.yaml to
#      the pods + secrets Role in role.yaml) so the launcher can manage runner
#      Pods and their per-launch token Secrets.
#   2. Mount the sandbox config.yaml and point GOALRAIL_CONFIG at it so the
#      server parses the `sandbox: provider: kubernetes` section.
#
# NOTE: the server image must include the `kubernetes` extra
# (`pip install 'goalrail[kubernetes]'`) for the provider to import the client.
apiVersion: apps/v1
kind: Deployment
metadata:
  name: goalrail
spec:
  template:
    spec:
      serviceAccountName: goalrail-server
      containers:
        - name: goalrail
          env:
            - name: GOALRAIL_CONFIG
              value: /etc/goalrail/config.yaml
          volumeMounts:
            - name: sandbox-config
              mountPath: /etc/goalrail
              readOnly: true
      volumes:
        - name: sandbox-config
          configMap:
            name: goalrail-sandbox-config
