---
# RBAC for the kubernetes sandbox provider (on-demand runner Pods).
#
# TWO-NAMESPACE, LEAST-BLAST-RADIUS DESIGN: the server, its DB/PVC and its
# Secrets live in `goalrail`; the runner Pods live in a SEPARATE
# `goalrail-sandboxes` namespace. The server SA's pods create/get/delete +
# secrets create/delete rights are scoped (via a Role + RoleBinding) to
# `goalrail-sandboxes` ONLY — so a compromised server can manage RUNNER Pods but
# CANNOT delete the server/DB Pods, read the server's Secrets, nor (because
# there is no pods/exec grant) execute commands inside any Pod.
#
#   goalrail-server  — the Goalrail server runs as this SA (this file; lives in
#                      `goalrail`). deployment-patch.yaml sets
#                      serviceAccountName: goalrail-server. The launcher uses its
#                      in-cluster token to manage runner Pods + their token
#                      Secrets in `goalrail-sandboxes`.
#   goalrail-runner  — the runner Pods run as this SA (serviceaccount-runner.yaml,
#                      lives in `goalrail-sandboxes`); it has NO API rights.
#
# Role (role.yaml) + RoleBinding (rolebinding.yaml) live in `goalrail-sandboxes`;
# the RoleBinding subject is the goalrail-server SA in `goalrail` (a
# cross-namespace binding — see rolebinding.yaml). Scope is a namespaced Role
# (NOT a ClusterRole) so the grant can never reach beyond the runner namespace.
apiVersion: v1
kind: ServiceAccount
metadata:
  name: goalrail-server
  namespace: goalrail
  labels:
    app.kubernetes.io/name: goalrail
    app.kubernetes.io/component: server
