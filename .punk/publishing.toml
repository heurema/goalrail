schema_version = "punk.publishing.binding.v1"

project_id = "goalrail"
workspace_ref = "punk-publishing://project/goalrail"

source_truth = [
  "docs/INDEX.md",
  "docs/product/GOALRAIL_PRODUCT_CONCEPT.md",
  "docs/product/GOALRAIL_MESSAGE_HIERARCHY.md",
  "docs/product/GOALRAIL_PUBLIC_NARRATIVE.md",
  "docs/product/GOALRAIL_PUBLIC_LANGUAGE.md",
  "docs/product/GOALRAIL_MVP_BLUEPRINT.md",
  "docs/product/GOALRAIL_IMPLEMENTATION_GUIDE.md",
  "docs/product/GOALRAIL_RULE_STACK.md",
  "docs/brand/SHORT_FORM_CONTENT_SYSTEM.md",
  "docs/ops/STATUS.md",
  "docs/ops/NEXT.md",
  "docs/ops/DECISIONS.md",
  "docs/ops/COMPONENTS.yaml",
  "docs/ops/REPO_STRUCTURE.md",
  "docs/ops/PUBLISHING_CONTENT_OPERATING_LAYER.md",
  "AGENTS.md",
  "README.md"
]

default_profile = "goalrail-founder-public-v1"
default_targets = []

[agent]
resolver_command = "punk publishing locate --project-root . --json"

[workspace]
ownership = "user-local"
resolution = "platform-native"
workspace_ref_kind = "logical"
storage_profile = "punk-publishing-project-workspace-v1"
migration_status = "pending"
secrets_policy = "no-secrets-in-repo"

[workspace.storage_classes]
config = "platform-config"
data = "platform-data"
state = "platform-state"
cache = "platform-cache"
credentials = "platform-keyring"

[workspace.path_policy]
expanded_paths_in_repo = "forbidden"
home_relative_paths_in_repo = "forbidden"
absolute_paths_in_repo = "forbidden"
windows_env_paths_in_repo = "forbidden"
path_expansion_owner = "resolver"

[resolver]
command = "punk publishing locate --project-root . --json"
output_format = "json"
platform_paths_policy = "compute-on-current-host"

[legacy]
repo_local_workspace = ".punk/publishing/"
status = "transitional"
write_policy = "do-not-use-as-default-workspace"
